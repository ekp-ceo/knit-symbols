<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_4코_구슬뜨기_한_코에서
    - KR_NAME_ABBR     : 긴뜨기4구슬
    - JA_NAME_FULL     : 中長編み4目の玉編み
    - JA_NAME_ABBR     : 中長4目玉編み
    - EN_NAME_US_FULL  : half_double_crochet_4_stitch_bobble
    - EN_NAME_US_ABBR  : hdc_4_st_bobble
    - EN_NAME_UK_FULL  : half_treble_crochet_4_stitch_bobble
    - EN_NAME_UK_ABBR  : htr_4_st_bobble
    - SYMBOL_SHAPE     : 4_branched_oval_almond_shape_with_top_bar
    - SYMBOL_STYLE     : hdc_4_bobble_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:2.5
    - STITCH_HEIGHT    : 2.5
    - STITCH_COUNT     : 4
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 4코 구슬뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 4코 구슬뜨기 (한 코에서) 기호. 구슬뜨기(pop) 카테고리의 네 번째 도안. 메인 그룹의 스케일을 기존 0.81에서 0.97로 20% 증폭하여 64x64 뷰포트 내에서 꽉 찬 볼륨감을 갖추도록 수정한 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 
    [전체 스케일 20% 확장 반영]
    - 변경: scale(0.81) -> scale(0.97) 로 조정하여 전체 요소를 균등하게 키움
  -->
  <g transform="translate(32, 32) scale(0.97) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 1번 기둥 (왼쪽 외곽 곡선) -->
    <path d="M 32 20 C 17.6 28, 17.6 44, 32 52"/>
    
    <!-- 2번 기둥 (왼쪽 내측 곡선) -->
    <path d="M 32 20 C 24.8 28, 24.8 44, 32 52"/>
    
    <!-- 3번 기둥 (오른쪽 내측 곡선) -->
    <path d="M 32 20 C 39.2 28, 39.2 44, 32 52"/>
    
    <!-- 4번 기둥 (오른쪽 외곽 곡선) -->
    <path d="M 32 20 C 46.4 28, 46.4 44, 32 52"/>
  </g>
</svg>
