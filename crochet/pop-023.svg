<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_4코_팝콘뜨기_한_코에서
    - KR_NAME_ABBR     : 긴4팝콘
    - JA_NAME_FULL     : 中長編み4目のポップコーン編み
    - JA_NAME_ABBR     : 中長4目ポップコーン
    - EN_NAME_US_FULL  : half_double_crochet_4_stitch_popcorn
    - EN_NAME_US_ABBR  : hdc_4_st_popcorn
    - EN_NAME_UK_FULL  : half_treble_crochet_4_stitch_popcorn
    - EN_NAME_UK_ABBR  : htr_4_st_popcorn
    - SYMBOL_SHAPE     : flat_oval_top_ring_with_outer_shell_enclosing_2_inner_curves
    - SYMBOL_STYLE     : hdc_4_popcorn_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : popcorn_top_ring
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 2
    - STITCH_COUNT     : 4
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 4코 팝콘뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 4코 팝콘뜨기 (한 코에서) 기호. 상단 타원 링과 침범 없는 내부 2가닥 곡선 기둥, 그리고 전체를 감싸는 외곽 2가닥 선으로 이루어진 총 4코 스펙의 정밀 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 가로형 타원 링 (머리 고리) -->
    <path d="M 32 16 C 40 16, 43 19, 42 22 C 40 25, 24 25, 22 22 C 21 19, 24 16, 32 16 Z" />

    <!-- 1번 가닥: 팝콘 외곽 왼쪽 라인 (타원 왼쪽 끝에서 하단 중심 32,54로) -->
    <path d="M 22 22 C 12 30, 12 48, 32 54" />

    <!-- 2번 가닥: 내부 왼쪽 곡선 기둥 (타원을 침범하지 않게 Y=24.5에서 시작) -->
    <path d="M 27 24.5 C 23 34, 23 47, 32 54" />
    
    <!-- 3번 가닥: 내부 오른쪽 곡선 기둥 (타원을 침범하지 않게 Y=24.5에서 시작) -->
    <path d="M 37 24.5 C 41 34, 41 47, 32 54" />

    <!-- 4번 가닥: 팝콘 외곽 오른쪽 라인 (타원 오른쪽 끝에서 하단 중심 32,54로) -->
    <path d="M 42 22 C 52 30, 52 48, 32 54" />
  </g>
</svg>
