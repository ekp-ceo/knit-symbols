<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 짧은뜨기_3코_늘려뜨기
    - KR_NAME_ABBR     : 짧은3늘려
    - JA_NAME_FULL     : 細編み3目編み入れる
    - JA_NAME_ABBR     : 細2増し(3目)
    - EN_NAME_US_FULL  : single_crochet_3_stitch_increase
    - EN_NAME_US_ABBR  : sc_3_st_inc
    - EN_NAME_UK_FULL  : double_crochet_3_stitch_increase
    - EN_NAME_UK_ABBR  : dc_3_st_inc
    - SYMBOL_SHAPE     : w_shape
    - SYMBOL_STYLE     : cross_contained
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:1
    - STITCH_HEIGHT    : 1
    - STITCH_COUNT     : 3
    - CATEGORY         : inc
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>짧은뜨기 3코 늘려뜨기</dc:title>
        <dc:description>보그 코바늘 표준 짧은뜨기 3코 늘려뜨기 기호. 가운데 선을 줄이고 상단 X를 키워 유격을 둔 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 수직 기둥의 높이를 낮추고, X의 크기를 키워 상호 간섭이 없도록 정밀 마감 -->
  <g fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 외곽 V자 줄기 -->
    <path d="M 14 20 L 32 50 L 50 20"/>
    
    <!-- 중앙 수직 줄기 (X 기호와 간격을 벌리기 위해 끝점을 cy=34로 대폭 낮춤) -->
    <path d="M 32 50 L 32 34"/>
    
    <!-- 내부 상단 중앙 확대된 짧은뜨기(X) 기호 (cy=20 중심으로 크기 키움, 하단 끝점은 26) -->
    <path d="M 26 14 L 38 26"/>
    <path d="M 38 14 L 26 26"/>
  </g>
</svg>
