<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_3코_구슬뜨기_한_코에서
    - KR_NAME_ABBR     : 긴뜨기3구슬
    - JA_NAME_FULL     : 中長編み3目の玉編み
    - JA_NAME_ABBR     : 中長3目玉編み
    - EN_NAME_US_FULL  : half_double_crochet_3_stitch_bobble
    - EN_NAME_US_ABBR  : hdc_3_st_bobble
    - EN_NAME_UK_FULL  : half_treble_crochet_3_stitch_bobble
    - EN_NAME_UK_ABBR  : htr_3_st_bobble
    - SYMBOL_SHAPE     : oval_almond_shape_with_center_bar_and_top_bar
    - SYMBOL_STYLE     : hdc_3_bobble_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:2.5
    - STITCH_HEIGHT    : 2.5
    - STITCH_COUNT     : 3
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 3코 구슬뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 3코 구슬뜨기 기호. 구슬뜨기(pop) 카테고리의 두 번째 도안. 2코 구슬뜨기의 타원형 외곽 프레임 중심에 수직 축인 중앙 기둥을 직선으로 곧게 연결하여 3가닥의 밸런스를 맞춘 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(0.81) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 왼쪽 곡선 다리 -->
    <path d="M 32 20 C 20 28, 20 44, 32 52"/>
    
    <!-- 중앙 수직 직선 다리 (3코 구슬뜨기 핵심 축) -->
    <path d="M 32 20 L 32 52"/>
    
    <!-- 오른쪽 곡선 다리 -->
    <path d="M 32 20 C 44 28, 44 44, 32 52"/>
