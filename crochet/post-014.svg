    - CATEGORY          : post_combination
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 뒤걸어 3코 늘려뜨기</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 뒤걸어 3코 늘려뜨기 실존 기호. 13번 기호에서 검증된 3분기 기둥 및 대칭형 빗금의 마이크로 좌표를 완벽히 유지하고, 하단 단일 훅을 왼쪽 반전 및 정중앙 정렬한 14번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 머리 바 3개 -->
    <path d="M 11.5 10 L 22 10" />
    <path d="M 27 10 L 37 10" />
    <path d="M 42 10 L 52.5 10" />

    <!-- 2. 삼지창(부채꼴)형 3분기 기둥 몸통 -->
    <path d="M 16 10 L 32 30" />
    <path d="M 32 10 L 32 30" />
    <path d="M 48 10 L 32 30" />

    <!-- 3. 몸통 사선 빗금 3개 (13번 마스터 데이터 완벽 동기화) -->
    <!-- 1번(좌측) 빗금 -->
    <path d="M 19.0 18.5 L 24.6 16.0" />
    <!-- 2번(중앙) 빗금 -->
    <path d="M 29.0 19.0 L 35.0 16.0" />
    <!-- 3번(우측) 빗금 (우하향 대칭) -->
    <path d="M 39.9 18.0 L 45.5 15.5" />

    <!-- 4. 하단 단일 뿌리: 가운데 정렬 원형 뒤걸어 훅 (왼쪽 반전) -->
    <!-- X=32 축에서 시작해 왼쪽(X=26)으로 휘감아 돌며 원형 루프의 중심을 정중앙 정렬 -->
    <path d="M 32 30 L 32 32 C 32 34, 26 34, 24 37 C 21 42, 23 52, 32 52 C 41 52, 41 42, 41 42" />
  </g>
