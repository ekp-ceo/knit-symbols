<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_뒤걸어_3코_늘려뜨기
    - KR_NAME_ABBR     : 한길뒤걸어3코늘려
    - JA_NAME_FULL     : 長編みの裏引き上げ3目編み入れる
    - JA_NAME_ABBR     : 長編裏引3目編入
    - EN_NAME_US_FULL  : 3_dc_increase_back_post
    - EN_NAME_US_ABBR  : bpdc_3inc
    - EN_NAME_UK_FULL  : 3_tr_increase_back_post
    - EN_NAME_UK_ABBR  : bptr_3inc
    - SYMBOL_SHAPE     : trident_stem_with_final_optimized_symmetrical_slashes_and_back_hook
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : back_post_hook_triple_branch
