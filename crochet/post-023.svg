<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - FILE_NAME        : post-023.svg
    - KR_NAME_FULL     : 세길_긴뜨기_교차뜨기_왼쪽
    - KR_NAME_ABBR     : 세길긴뜨기교차_왼쪽
    - JA_NAME_FULL     : 三つ巻き長編みの交差編み_左
    - JA_NAME_ABBR     : 三つ巻き長編交差_左
    - EN_NAME_US_FULL  : treble_crochet_cross_stitch_left
    - EN_NAME_US_ABBR  : trc_cross_l
    - SYMBOL_SHAPE     : pure_x_cross_with_overlapped_gap
    - SYMBOL_STYLE     : vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : cross_overlapped_left_up_clean_root
    - STITCH_RATIO     : 2:2
    - STITCH_HEIGHT    : 5
    - STITCH_COUNT     : 2
    - CATEGORY          : cross_combination
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>세길 긴뜨기 교차뜨기 - 왼쪽</dc:title>
        <dc:description>보그 코바늘 표준 세길 긴뜨기 교차뜨기 기호 (왼쪽). 3번 빗금은 원상복귀하고 가장 하단의 1번 빗금만 바깥쪽으로 0.5px 추가 시프트하여 교차점 부근의 형태 인지성을 최종 최적화한 23번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 메인 기둥 뼈대 그룹 (기본 두께 4.5px) -->
  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 독립된 머리 바 2개 (80% 스케일) -->
    <path d="M 16.0 14.4 L 25.6 14.4" />
    <path d="M 38.4 14.4 L 48.0 14.4" />

    <!-- 2. X자형 교차 몸통 -->
    <!-- [전면] 오른쪽에서 올라가는 우상향 기둥 -->
    <path d="M 20.8 49.6 L 43.2 14.4" />
    
    <!-- [후면] 왼쪽에서 올라가는 좌상향 기둥 (중앙 마스킹 갭 적용) -->
    <path d="M 43.2 49.6 L 35.0 36.8" />
    <path d="M 29.0 27.2 L 20.8 14.4" />
  </g>

  <!-- 3. 기둥별 세길 긴뜨기 사선 빗금 세트 (두께 3.15px, 최하단 1번 빗금 추가 이동 및 3번 원상복귀 반영) -->
  <g fill="none" stroke="#000000" stroke-width="3.15" stroke-linecap="round" stroke-linejoin="round">
    <!-- [오른쪽 기둥 부하] 오리지널 좌상향 빗금 3줄 -->
    <path d="M 30.0 25.75 L 24.4 28.25" /> <!-- 1번 가장 아래 빗금 (추가 바깥 이동: 기존에서 X-0.5, Y+0.25) -->
    <path d="M 28.5 21.5 L 22.9 24.0" />   <!-- 2번 중간 빗금 (유지) -->
    <path d="M 25.5 18.0 L 19.9 20.5" />   <!-- 3번 위쪽 빗금 (오리지널 위치로 원상복귀) -->

    <!-- [왼쪽 기둥 부하] 데칼코마니 거울 반전 우상향 빗금 3줄 -->
    <path d="M 34.0 25.75 L 39.6 28.25" /> <!-- 1번 가장 아래 빗금 (추가 바깥 이동: 기존에서 X+0.5, Y+0.25) -->
    <path d="M 35.5 21.5 L 41.1 24.0" />   <!-- 2번 중간 빗금 (유지) -->
    <path d="M 38.5 18.0 L 44.1 20.5" />   <!-- 3번 위쪽 빗금 (오리지널 위치로 원상복귀) -->
  </g>
</svg>
