<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_뒤걸어_3코_모아뜨기
    - KR_NAME_ABBR     : 한길뒤걸어3코모아
    - JA_NAME_FULL     : 長編みの裏引き上げ3目一度
    - JA_NAME_ABBR     : 長編裏引3目一度
    - EN_NAME_US_FULL  : back_post_double_crochet_3_together
    - EN_NAME_US_ABBR  : bpdc3tog
    - EN_NAME_UK_FULL  : back_post_treble_crochet_3_together
    - EN_NAME_UK_ABBR  : bptr3tog
    - SYMBOL_SHAPE     : inverted_trident_stem_80pct_with_balanced_slashes_and_three_back_hooks
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : back_post_hook_triple_root
    - STITCH_RATIO     : 3:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 3
    - CATEGORY          : post_combination
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 뒤걸어 3코 모아뜨기</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 뒤걸어 3코 모아뜨기 실존 기호. 16번에서 검증 완료된 80% 축소 스케일 몸통과 마이크로 빗금 정렬 좌표를 완벽히 유지하고, 하단 3개의 고리를 왼쪽 반전하여 시각적 독립성을 확보한 17번 마스터 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 공통 수평 머리 바 -->
    <path d="M 24 14.4 L 40 14.4" />

    <!-- 2. 뒤집힌 삼지창형 기둥 몸통 -->
    <path d="M 14.8 33.6 L 32 14.4" />
    <path d="M 32.0 33.6 L 32 14.4" />
    <path d="M 49.2 33.6 L 32 14.4" />

    <!-- 3. 몸통 사선 빗금 3개 (16번 마스터 데이터 완벽 동기화) -->
    <!-- 1번(좌측) 빗금 -->
    <path d="M 18.1 28.1 L 23.7 25.6" />
    <!-- 2번(중앙) 빗금 -->
    <path d="M 29.0 27.8 L 35.0 24.8" />
    <!-- 3번(우측) 빗금 (우하향 대칭) -->
    <path d="M 40.3 25.6 L 45.9 28.1" />

    <!-- 4. 하단 세 다리의 독립형 원형 뒤걸어 훅 3개 (왼쪽 반전 & 80% 콤팩트 스케일) -->
    <!-- 왼쪽 뒤걸어 훅 (시작점 X=14.8에서 왼쪽 회전) -->
    <path d="M 14.8 33.6 L 14.8 34.8 C 14.8 36.0, 10.8 36.0, 9.6 38.0 C 8.4 41.2, 9.6 46.4, 14.8 46.4 C 20.0 46.4, 20.0 41.2, 20.0 41.2" />
    <!-- 중앙 뒤걸어 훅 (시작점 X=32.0에서 왼쪽 회전) -->
    <path d="M 32.0 33.6 L 32.0 34.8 C 32.0 36.0, 28.0 36.0, 26.8 38.0 C 25.6 41.2, 26.8 46.4, 32.0 46.4 C 37.2 46.4, 37.2 41.2, 37.2 41.2" />
    <!-- 오른쪽 뒤걸어 훅 (시작점 X=49.2에서 왼쪽 회전) -->
    <path d="M 49.2 33.6 L 49.2 34.8 C 49.2 36.0, 45.2 36.0, 44.4 38.0 C 43.2 41.2, 44.4 46.4, 49.2 46.4 C 54.0 46.4, 54.0 41.2, 54.0 41.2" />
  </g>
</svg>
