<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 두길_긴뜨기_앞걸어뜨기
    - KR_NAME_ABBR     : 두길앞걸어
    - JA_NAME_FULL     : 長々編みの表引き上げ編み
    - JA_NAME_ABBR     : 長々編表引き上げ
    - EN_NAME_US_FULL  : front_post_treble_crochet
    - EN_NAME_US_ABBR  : tr_post
    - EN_NAME_UK_FULL  : front_post_double_treble_crochet
    - EN_NAME_UK_ABBR  : dtr_post
    - SYMBOL_SHAPE     : top_bar_with_double_slash_stem_and_centered_loop_front_post_hook
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : front_post_hook
    - STITCH_RATIO     : 1:4
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 1
    - CATEGORY          : post
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길 긴뜨기 앞걸어뜨기</dc:title>
        <dc:description>보그 코바늘 표준 두길 긴뜨기 앞걸어뜨기 실존 기호. 상단 수평 머리 바와 수직 기둥 중심에 독립된 사선 빗금 2개를 정렬하고, 하단 원형 훅의 기하학적 중심을 기둥 중심축(X=32)과 정확히 정중앙 대칭으로 일치시킨 4번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 두길 긴뜨기 상단 수평 머리 바 -->
    <path d="M 22 10 L 42 10" />

    <!-- 2. 몸통 중심에 나란히 배치된 사선 빗금 2개 (수직 간격 분리) -->
    <!-- 상단 빗금 -->
    <path d="M 28.5 21.0 L 34.5 18.0" />
    <!-- 하단 빗금 -->
    <path d="M 28.5 27.0 L 34.5 24.0" />

    <!-- 3. 정석 궤적: 수직 기둥 및 가운데 정렬 원형 훅 -->
    <!-- X=32 축을 타고 직진 후, 우측으로 회전하며 하단 루프가 정중앙에 배치되도록 제어 -->
    <path d="M 32 10 L 32 30 C 32 32, 38 32, 40 35 C 43 40, 41 50, 32 50 C 23 50, 23 40, 23 40" />
  </g>
</svg>
