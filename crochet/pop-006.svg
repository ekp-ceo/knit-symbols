<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_2코_구슬뜨기_한_코에서
    - KR_NAME_ABBR     : 한길2구슬
    - JA_NAME_FULL     : 長編み2目の玉編み
    - JA_NAME_ABBR     : 長2目玉編み
    - EN_NAME_US_FULL  : double_crochet_2_stitch_bobble
    - EN_NAME_US_ABBR  : dc_2_st_bobble
    - EN_NAME_UK_FULL  : treble_crochet_2_stitch_bobble
    - EN_NAME_UK_ABBR  : tr_2_st_dec
    - SYMBOL_SHAPE     : oval_almond_shape_with_top_bar_and_slashes
    - SYMBOL_STYLE     : dc_2_bobble_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 2
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 2코 구슬뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 2코 구슬뜨기 (한 코에서) 기호. 구슬뜨기(pop) 카테고리의 여섯 번째 도안. 좌우 단선 빗금을 각각 바깥쪽으로 3px 수평 이동하여 내부 시인성을 극대화한 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(0.97) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 왼쪽 곡선 다리 및 빗금 -->
    <g>
      <path d="M 32 20 C 18 28, 18 44, 32 52"/>
      <!-- 왼쪽 빗금 (바깥쪽으로 3px 이동: X축 -3 반영) -->
      <path d="M 18.5 34.5 L 24.5 37.5"/>
    </g>
    
    <!-- 오른쪽 곡선 다리 및 빗금 -->
    <g>
      <path d="M 32 20 C 46 28, 46 44, 32 52"/>
      <!-- 오른쪽 빗금 (바깥쪽으로 3px 이동: X축 +3 반영) -->
      <path d="M 39.5 34.5 L 45.5 37.5"/>
    </g>
  </g>
</svg>
