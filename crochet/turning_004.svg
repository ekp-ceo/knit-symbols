  <!-- turning 전용 데이터셋 마스터 규격을 완벽히 성립하고, 개별 타원(ry=6.5)의 정밀 접점(y=16.5, y=29.5, y=42.5)을 사수하여 선 겹침 없이 4개의 사슬이 매끄럽게 수직 연결된 두길긴뜨기용 기둥코 4코 마스터 완본 그래픽 -->
