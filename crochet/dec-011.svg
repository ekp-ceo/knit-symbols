<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길긴뜨기_5코_모아뜨기
    - KR_NAME_ABBR     : 한길5모아
    - JA_NAME_FULL     : 長編み5目一度
    - JA_NAME_ABBR     : 長5目一度
    - EN_NAME_US_FULL  : double_crochet_5_stitch_decrease
    - EN_NAME_US_ABBR  : dc_5_st_dec
    - EN_NAME_UK_FULL  : treble_crochet_5_stitch_decrease
    - EN_NAME_UK_ABBR  : tr_5_st_dec
    - SYMBOL_SHAPE     : 5_branched_inverted_fan_with_top_bar_and_slashes
    - SYMBOL_STYLE     : dc_5_together_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 5
    - CATEGORY          : dec
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길긴뜨기 5코 모아뜨기</dc:title>
        <dc:description>보그 코바늘 표준 한길긴뜨기 5코 모아뜨기 기호. 모아뜨기(dec) 카테고리의 열한 번째 도안. 모든 빗금의 Y축 위치를 추가로 0.5px 더 하향(44.2 ~ 47.8) 조정하여 기둥 하단부 배치 밸런스를 완전하게 마감한 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(0.81) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 
      [빗금 Y축 0.5px 추가 하향 조정 반영]
      - 변경: M 28.8 44.2 L 35.2 47.8 (Y축 +0.5 추가 적용)
    -->

    <!-- 1번 기둥: 왼쪽 끝 (-37.5도) -->
    <g transform="rotate(-37.5, 32, 20)">
      <path d="M 32 20 L 32 52"/>
      <path d="M 28.8 44.2 L 35.2 47.8"/>
    </g>

    <!-- 2번 기둥: 왼쪽 안 (-19도) -->
    <g transform="rotate(-19, 32, 20)">
      <path d="M 32 20 L 32 52"/>
      <path d="M 28.8 44.2 L 35.2 47.8"/>
    </g>

    <!-- 3번 기둥: 정중앙 수직 기둥 (0도 고정) -->
    <g>
      <path d="M 32 20 L 32 52"/>
      <path d="M 28.8 44.2 L 35.2 47.8"/>
    </g>

    <!-- 4번 기둥: 오른쪽 안 (19도) -->
    <g transform="rotate(19, 32, 20)">
      <path d="M 32 20 L 32 52"/>
      <path d="M 28.8 44.2 L 35.2 47.8"/>
    </g>

    <!-- 5번 기둥: 오른쪽 끝 (37.5도) -->
    <g transform="rotate(37.5, 32, 20)">
      <path d="M 32 20 L 32 52"/>
      <path d="M 28.8 44.2 L 35.2 47.8"/>
    </g>
  </g>
</svg>
