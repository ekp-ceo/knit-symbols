<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_4코_구슬뜨기_코_아래에서
    - KR_NAME_ABBR     : 한길4구슬_아래
    - JA_NAME_FULL     : 長編み4目の玉編み_下
    - JA_NAME_ABBR     : 長4目玉編み_下
    - EN_NAME_US_FULL  : double_crochet_4_stitch_bobble_from_below
    - EN_NAME_US_ABBR  : dc_4_st_bobble_blw
    - EN_NAME_UK_FULL  : treble_crochet_4_stitch_bobble_from_below
    - EN_NAME_UK_BR  : tr_4_st_bobble_blw
    - SYMBOL_SHAPE     : 4_branched_inverted_open_oval_shape_with_top_bar_and_slashes
    - SYMBOL_STYLE     : dc_4_bobble_open_base
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 4
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 4코 구슬뜨기 (코 아래에서)</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 4코 구슬뜨기 (코 아래에서) 기호. 구슬뜨기(pop) 카테고리의 열한 번째 도안. 내측 2번과 3번 기둥의 단선 빗금을 중앙 방향으로 각각 2px 수평 이동하여 기둥 간 대칭 밸런스를 최종 최적화한 마스터본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(1.26) translate(-32, -32) translate(0, 2)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 1번 기둥 (왼쪽 외곽 곡선 및 빗금) -->
    <g>
      <path d="M 32 20 C 11 28, 11 44, 16 52"/>
      <path d="M 11.5 37.1 L 16.1 39.4"/>
    </g>
    
    <!-- 2번 기둥 (왼쪽 내측 곡선 및 빗금 - 안쪽으로 2px 이동) -->
    <g>
      <path d="M 32 20 C 21 28, 21 44, 26 52"/>
      <!-- X축 우측으로 2px 이동 (19.5/24.1 -> 21.5/26.1) -->
      <path d="M 21.5 37.1 L 26.1 39.4"/>
    </g>
    
    <!-- 3번 기둥 (오른쪽 내측 곡선 및 빗금 - 안쪽으로 2px 이동) -->
    <g>
      <path d="M 32 20 C 43 28, 43 44, 38 52"/>
      <!-- X축 좌측으로 2px 이동 (39.9/44.5 -> 37.9/42.5) -->
      <path d="M 37.9 38.1 L 42.5 40.4"/>
    </g>
    
    <!-- 4번 기둥 (오른쪽 외곽 곡선 및 빗금) -->
    <g>
      <path d="M 32 20 C 53 28, 53 44, 48 52"/>
      <path d="M 47.9 37.1 L 52.5 39.4"/>
    </g>
  </g>
</svg>
