      <rdf:Description>
        <dc:title>긴뜨기 2코 넣는 이랑뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 2코 넣는 이랑뜨기 기호. 각 긴뜨기 기둥의 상단 가로 바를 중앙에서 명확하게 떨어뜨려 독립된 T자 형태를 유지하고, 하단 한 점으로 모이는 V자 구조와 하단 수평 이랑 바를 결합한 마스터 완본.</dc:description>
      </rdf:Description>
