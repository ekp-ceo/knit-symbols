    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길긴뜨기_4코_모아뜨기
    - KR_NAME_ABBR     : 한길4모아
    - JA_NAME_FULL     : 長編み4目一度
    - JA_NAME_ABBR     : 長4目一度
    - EN_NAME_US_FULL  : double_crochet_4_stitch_decrease
