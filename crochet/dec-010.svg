    - EN_NAME_UK_FULL  : treble_crochet_4_stitch_decrease
    - EN_NAME_UK_ABBR  : tr_4_st_dec
    - SYMBOL_SHAPE     : 4_branched_inverted_fan_with_top_bar_and_slashes
    - SYMBOL_STYLE     : dc_4_together_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
