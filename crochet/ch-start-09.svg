<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA] - 두길긴뜨기 늘려뜨기 시작코 첫 번째 버전 - 사슬2 (빗금 2차 수정)
    - FILE_NAME        : ch-start-09.svg
    - KR_NAME_FULL     : 두길긴뜨기_2코_늘려뜨기_시작코_사슬2
    - KR_NAME_ABBR     : 두길긴뜨기2코늘려_시작코_2ch
    - JA_NAME_FULL     : 長々編みの2目編み入れる_立ち上がり
    - JA_NAME_ABBR     : 長々2目入れる_立ち上がり
    - EN_NAME_US_FULL  : treble_crochet_2_stitch_increase_with_2_chain_start
    - EN_NAME_US_ABBR  : tr_2inc_2ch_start
    - SYMBOL_SHAPE     : v_fork_with_flat_bottom_double_slashed_and_2_aligned_chains
    - SYMBOL_STYLE     : vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_root_asymmetric_double_slashed_slim_chain
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 5
    - STITCH_COUNT     : 2
    - CATEGORY          : chain_start_column
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길긴뜨기 2코 늘려뜨기_시작코 (사슬2)</dc:title>
        <dc:description>보그 코바늘 표준 [사슬 포함 시작코(ch-start)] 카테고리의 9번 마스터 기호. 좌측 경사 기둥 위의 평행 빗금 2줄을 최종 요청 수치(상단: 왼쪽으로 2px 추가, 하단: 오른쪽으로 2px 추가)대로 재배치하여 빗금 간 격조를 시원하게 벌린 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 1. 좌측 일반 두길긴뜨기 기둥 그룹 (기본 두께 4.5px, 바닥 평면 정렬, 빗금 위치 최종 튜닝) -->
  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 좌측 두길긴뜨기 상단 머리 바 (높이 Y=16.0 기준선) -->
    <path d="M 12.0 16.0 L 22.0 16.0" />

    <!-- 좌측 두길긴뜨기 메인 경사 기둥 (바닥점 32.0, 49.6) -->
    <path d="M 32.0 49.6 L 17.0 16.0" />

    <!-- ★최종 조정 반영: 기둥 중앙 두길긴뜨기 사선 빗금 2줄 -->
    <!-- 상단 빗금 (이전에서 왼쪽으로 2px 이동) -->
    <path d="M 20.0 30.0 L 25.0 26.0" /> 
    <!-- 하단 빗금 (이전에서 오른쪽으로 2px 이동) -->
    <path d="M 24.0 38.5 L 29.0 34.5" /> 
  </g>

  <!-- 2. 우측 시작 사슬코 기둥 세트 (35도 경사 유지 + 사슬 2개 마스터 좌표 계승) -->
  <!-- 사슬 외곽선 3.5px, 내부 fill="#ffffff"로 구멍 개방 효과 극대화 -->
  <g stroke="#000000" stroke-width="3.5" fill="#ffffff" stroke-linejoin="round">
    <!-- 하단 사슬코 (바닥 위치 수평 정렬 고정) -->
    <ellipse cx="37.0" cy="42.2" rx="3.5" ry="8.5" transform="rotate(35 37.0 42.2)" />
    
    <!-- 상단 사슬코 (우측 정밀 튜닝 완료 좌표 고정) -->
    <ellipse cx="47.2" cy="25.5" rx="3.5" ry="8.5" transform="rotate(35 47.2 25.5)" />
  </g>
</svg>
