<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_2코_모아뜨기
    - KR_NAME_ABBR     : 긴2모아
    - JA_NAME_FULL     : 中長編み2目一度
    - JA_NAME_ABBR     : 中長2目一度
    - EN_NAME_US_FULL  : half_double_crochet_2_stitch_decrease
    - EN_NAME_US_ABBR  : hdc_2_st_dec
    - EN_NAME_UK_FULL  : half_treble_crochet_2_stitch_decrease
    - EN_NAME_UK_ABBR  : htr_2_st_dec
    - SYMBOL_SHAPE     : inverted_v_shape_with_top_bar\\
    - SYMBOL_STYLE     : hdc_2_together_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 2
    - STITCH_COUNT     : 2
    - CATEGORY          : dec
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 2코 모아뜨기</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 2코 모아뜨기 기호. 모아뜨기(dec) 카테고리의 세 번째 도안. 상단 꼭짓점(32, 20)에 긴뜨기 고유의 수평 바를 배치하고, 아래로 두 다리가 시원하게 뻗어 나가는 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- [0.81 스케일 및 캔버스 센터 정렬 밸런스 완벽 유지] -->
  <g transform="translate(32, 32) scale(0.81) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 상단 긴뜨기 머리 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 역V자 메인 두 다리 줄기 (상단 꼭짓점 32, 20에서 양끝으로 전개) -->
    <path d="M 10 52 L 32 20 L 54 52"/>
    
  </g>
</svg>
