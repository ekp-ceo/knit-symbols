  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 2코 모아 이랑뜨기</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 2코 모아 이랑뜨기 실존 기호. 역V자(A자) 구조의 사선 기둥 몸통 중심에 맞춰 빗금을 수직 1px 하향 조정하고, 하단 수평 이랑 바를 결합한 12번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
