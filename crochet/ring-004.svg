<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 원형_사슬_10코
    - KR_NAME_ABBR     : 원형사슬_10
    - JA_NAME_FULL     : 鎖の輪作り目10目
    - JA_NAME_ABBR     : 鎖輪10
    - EN_NAME_US_FULL  : chain_ring_10_stitches
    - EN_NAME_US_ABBR  : ch_ring_10
    - EN_NAME_UK_FULL  : chain_ring_10_stitches
    - EN_NAME_UK_ABBR  : ch_ring_10
    - SYMBOL_SHAPE     : ring_chains
    - SYMBOL_STYLE     : 10_stitches
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : center
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:1
    - STITCH_HEIGHT    : 1
    - STITCH_COUNT     : 10
    - CATEGORY         : ring
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>원형 사슬 10코</dc:title>
        <dc:description>보그 코바늘 표준 원형 사슬 10코 기호. 과도한 겹침을 방지하도록 콤팩트하게 다듬은 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 개별 사슬 크기를 축소(rx=6.5, ry=3.2)하여 겹침을 최소화하고 정렬감을 높인 디자인 -->
  <g fill="none" stroke="#000000" stroke-width="3">
    <!-- 0도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(0 32 32)"/>
    <!-- 36도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(36 32 32)"/>
    <!-- 72도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(72 32 32)"/>
    <!-- 108도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(108 32 32)"/>
    <!-- 144도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(144 32 32)"/>
    <!-- 180도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(180 32 32)"/>
    <!-- 216도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(216 32 32)"/>
    <!-- 252도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(252 32 32)"/>
    <!-- 288도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(288 32 32)"/>
    <!-- 324도 -->
    <ellipse cx="32" cy="12" rx="6.5" ry="3.2" transform="rotate(324 32 32)"/>
  </g>
</svg>
