<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_앞걸어_3코_모아뜨기
    - KR_NAME_ABBR     : 한길앞걸어3코모아
    - JA_NAME_FULL     : 長編みの表引き上げ3目一度
    - JA_NAME_ABBR     : 長編表引3目一度
    - EN_NAME_US_FULL  : front_post_double_crochet_3_together
    - EN_NAME_US_ABBR  : fpdc3tog
    - EN_NAME_UK_FULL  : front_post_treble_crochet_3_together
    - EN_NAME_UK_ABBR  : fptr3tog
    - SYMBOL_SHAPE     : inverted_trident_stem_80pct_with_balanced_slashes
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : front_post_hook_triple_root
    - STITCH_RATIO     : 3:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 3
    - CATEGORY          : post_combination
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 앞걸어 3코 모아뜨기</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 앞걸어 3코 모아뜨기 실존 기호. 중앙 빗금을 추가 하향하고 양측 빗금을 바깥쪽으로 각각 1px씩 이동시켜 광폭 사선 기둥 중심축에 자석처럼 밀착 정렬한 17번 마스터 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 공통 수평 머리 바 -->
    <path d="M 24 14.4 L 40 14.4" />

    <!-- 2. 뒤집힌 삼지창형 기둥 몸통 -->
    <path d="M 14.8 33.6 L 32 14.4" />
    <path d="M 32.0 33.6 L 32 14.4" />
    <path d="M 49.2 33.6 L 32 14.4" />

    <!-- 3. 몸통 사선 빗금 3개 (중앙 하향 및 양측 바깥쪽 1px 이동 반영) -->
    <!-- 1번(좌측) 빗금: 좌측(바깥쪽)으로 1px 수평 이동 (19.1/24.7 -> 18.1/23.7) -->
    <path d="M 18.1 28.1 L 23.7 25.6" />
    <!-- 2번(중앙) 빗금: 아래로 1.5px 수직 하향 (26.3/23.3 -> 27.8/24.8) -->
    <path d="M 29.0 27.8 L 35.0 24.8" />
    <!-- 3번(우측) 빗금: 우측(바깥쪽)으로 1px 수평 이동 (39.3/44.9 -> 40.3/45.9, 우하향 대칭) -->
    <path d="M 40.3 25.6 L 45.9 28.1" />

    <!-- 4. 하단 세 다리의 독립형 원형 앞걸어 훅 3개 (80% 콤팩트 스케일) -->
    <path d="M 14.8 33.6 L 14.8 34.8 C 14.8 36.0, 18.8 36.0, 20.0 38.0 C 21.2 41.2, 20.0 46.4, 14.8 46.4 C 9.6 46.4, 9.6 41.2, 9.6 41.2" />
    <path d="M 32.0 33.6 L 32.0 34.8 C 32.0 36.0, 36.0 36.0, 37.2 38.0 C 38.4 41.2, 37.2 46.4, 32.0 46.4 C 26.8 46.4, 26.8 41.2, 26.8 41.2" />
    <path d="M 49.2 33.6 L 49.2 34.8 C 49.2 36.0, 53.2 36.0, 54.4 38.0 C 55.6 41.2, 54.4 46.4, 49.2 46.4 C 44.0 46.4, 44.0 41.2, 44.0 41.2" />
