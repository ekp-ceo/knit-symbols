<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 짧은뜨기_2코_모아_이랑뜨기
    - KR_NAME_ABBR     : 짧은2코모아이랑
    - JA_NAME_FULL     : 細編み2目一度の畝編み_すじ編み
    - JA_NAME_ABBR     : 細編2目一度畝編み
    - EN_NAME_US_FULL  : single_crochet_2_stitch_decrease_back_loop_only
    - EN_NAME_US_ABBR  : sc_2_st_dec_blo
    - EN_NAME_UK_FULL  : double_crochet_2_stitch_increase_back_loop_only
    - EN_NAME_UK_ABBR  : dc_2_st_dec_blo
    - SYMBOL_SHAPE     : inverted_v_shape_cross_mark_with_bottom_flat_rib_bar
    - SYMBOL_STYLE     : ribbed_decrease_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_rib_bar
    - STITCH_RATIO     : 1:1
    - STITCH_HEIGHT    : 1
    - STITCH_COUNT     : 2
    - CATEGORY          : rib
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>짧은뜨기 2코 모아 이랑뜨기</dc:title>
        <dc:description>보그 코바늘 표준 짧은뜨기 2코 모아 이랑뜨기 기호. 두 개의 코가 상단 한 점에서 만나는 A자형 구조를 이루며, 그 하단을 평평한 수평 이랑 바가 받쳐주는 형태로 괄호 노이즈를 완벽히 제거한 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 짧은뜨기 2코 모아뜨기 (A자형 구조) -->
    <!-- 왼쪽 다리 기둥 (하단 Y=38에서 상단 수렴점 Y=16으로 진행) -->
    <path d="M 21 38 L 32 16" />
    <!-- 오른쪽 다리 기둥 -->
    <path d="M 43 38 L 32 16" />

    <!-- 2. 하단 이랑뜨기 가로 받침대 (Flat Rib Bar) -->
    <!-- 두 코를 나란히 받쳐줄 수 있도록 Y=48선에 와이드하게 배치 -->
    <path d="M 16 48 L 48 48" />
  </g>
</svg>
