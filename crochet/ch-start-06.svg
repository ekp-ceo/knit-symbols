<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA] - 한길긴뜨기 늘려뜨기 시작코 두 번째 버전 - 사슬3
    - FILE_NAME        : ch-start-06.svg
    - KR_NAME_FULL     : 한길긴뜨기_2코_늘려뜨기_시작코_사슬3
    - KR_NAME_ABBR     : 한길긴뜨기2코늘려_시작코_3ch
    - JA_NAME_FULL     : 長編みの2目編み入れる_立ち上がり3目
    - JA_NAME_ABBR     : 長2目入れる_立ち上がり3
    - EN_NAME_US_FULL  : double_crochet_2_stitch_increase_with_3_chain_start
    - EN_NAME_US_ABBR  : dc_2inc_3ch_start
    - SYMBOL_SHAPE     : v_fork_with_flat_bottom_slashed_and_3_compact_chains
    - SYMBOL_STYLE     : vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_root_asymmetric_slashed_3_compressed_slim_chain
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 2
    - CATEGORY          : chain_start_column
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길긴뜨기 2코 늘려뜨기_시작코 (사슬3)</dc:title>
        <dc:description>보그 코바늘 표준 [사슬 포함 시작코(ch-start)] 카테고리의 6번 마스터 기호. 좌측 경사 기둥에 한길긴뜨기 인증 사선 빗금 1줄을 유지하고, 우측에는 3단의 슬림 사슬코를 촘촘하게 압축 배치하여 전체 고도를 정밀하게 수평 매칭한 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 1. 좌측 일반 한길긴뜨기 기둥 그룹 (기본 두께 4.5px, 바닥 평면 정렬, 빗금 1줄 포함) -->
  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 좌측 한길긴뜨기 상단 머리 바 (높이 Y=16.0 기준선) -->
    <path d="M 12.0 16.0 L 22.0 16.0" />

    <!-- 좌측 한길긴뜨기 메인 경사 기둥 (바닥점 32.0, 49.6) -->
    <path d="M 32.0 49.6 L 17.0 16.0" />

    <!-- 한길긴뜨기 핵심 피처: 기둥 중앙 사선 빗금 1줄 -->
    <path d="M 21.5 35.5 L 26.5 31.5" />
  </g>

  <!-- 2. 우측 시작 사슬코 기둥 세트 (35도 경사 유지 + 긴뜨기 고도에 맞춰 3단 사슬 초정밀 압축 적층) -->
  <!-- 사슬 외곽선 3.5px, 내부 fill="#ffffff"로 구멍 개방 효과 극대화 -->
  <g stroke="#000000" stroke-width="3.5" fill="#ffffff" stroke-linejoin="round">
    <!-- [1층] 하단 사슬코 -->
    <ellipse cx="36.0" cy="43.5" rx="3.0" ry="6.5" transform="rotate(35 36.0 43.5)" />
    
    <!-- [2층] 중간 사슬코 -->
    <ellipse cx="42.0" cy="32.0" rx="3.0" ry="6.5" transform="rotate(35 42.0 32.0)" />

    <!-- [3층] 상단 사슬코 (최종 머리 높이가 한길긴뜨기 정점 라인인 Y=16.0에 안착) -->
    <ellipse cx="48.0" cy="20.5" rx="3.0" ry="6.5" transform="rotate(35 48.0 20.5)" />
  </g>
</svg>
