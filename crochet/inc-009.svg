<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길긴뜨기_2코_늘려뜨기_코_아래에서
    - KR_NAME_ABBR     : 한길2늘려_아래
    - JA_NAME_FULL     : 長編み2目編み入れる_束に
    - JA_NAME_ABBR     : 長2増し_束
    - EN_NAME_US_FULL  : double_crochet_increase_into_space
    - EN_NAME_US_ABBR  : dc_inc_sp
    - EN_NAME_UK_FULL  : treble_crochet_increase_into_space
    - EN_NAME_UK_ABBR  : tr_inc_sp
    - SYMBOL_SHAPE     : v_separated_base_with_slashes
    - SYMBOL_STYLE     : dc_branched_space_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : space_entry
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 2
    - CATEGORY         : inc
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길긴뜨기 2코 늘려뜨기_코 아래에서</dc:title>
        <dc:description>보그 코바늘 표준 기호. 상단 T바 분리는 물론 하단부도 한 점으로 모이지 않고 독립되어 톡 떨어지며, 몸통에 사선 빗금이 추가된 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 하단이 붙지 않는 2개의 기둥과 개별 상단 T바, 사선 빗금의 정밀 배치 -->
  <g fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 하단에서 만나지 않고 완전히 분리되어 내려오는 두 개의 기둥선 -->
    <!-- 왼쪽 기둥 (상단 20, 14 -> 하단 26, 52) -->
    <path d="M 20 14 L 26 52"/>
    <!-- 오른쪽 기둥 (상단 44, 14 -> 하단 38, 52) -->
    <path d="M 44 14 L 38 52"/>
    
    <!-- 왼쪽 기둥의 독립된 상단 수평 바 (중심 20) -->
    <path d="M 13 14 L 27 14"/>
    
    <!-- 오른쪽 기둥의 독립된 상단 수평 바 (중심 44) -->
    <path d="M 37 14 L 51 14"/>
    
    <!-- 왼쪽 기둥의 사선 빗금 (기둥 중심부에 교차하도록 정밀 커팅) -->
    <path d="M 19 31 L 26 35"/>
    
    <!-- 오른쪽 기둥의 사선 빗금 (기둥 중심부에 교차하도록 정밀 커팅) -->
    <path d="M 38 35 L 45 31"/>
  </g>
</svg>
