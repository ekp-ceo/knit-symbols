<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 두길_긴뜨기_4코_팝콘뜨기_한_코에서
    - KR_NAME_ABBR     : 두길4팝콘
    - JA_NAME_FULL     : 長々編み4目のポップコーン編み
    - JA_NAME_ABBR     : 長々4目ポップコーン
    - EN_NAME_US_FULL  : treble_crochet_4_stitch_popcorn
    - EN_NAME_US_ABBR  : tr_4_st_popcorn
    - EN_NAME_UK_FULL  : double_treble_crochet_4_stitch_popcorn
    - EN_NAME_UK_ABBR  : dtr_4_st_popcorn
    - SYMBOL_SHAPE     : flat_oval_top_ring_with_outer_shell_enclosing_2_inner_curves_with_double_slashes
    - SYMBOL_STYLE     : tr_4_popcorn_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : popcorn_top_ring
    - STITCH_RATIO     : 1:4
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 4
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길 긴뜨기 4코 팝콘뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 두길 긴뜨기 4코 팝콘뜨기 (한 코에서) 기호. 동일한 상단 타원 링과 하단 수렴점 규격 안에서 더블 빗금이 각각 포함된 외곽 2가닥 선과 내측 2가닥 곡선 기둥이 완벽한 균형을 이루는 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 가로형 타원 링 (머리 고리) -->
    <path d="M 32 12 C 40 12, 43 15, 42 18 C 40 21, 24 21, 22 18 C 21 15, 24 12, 32 12 Z" />

    <!-- 1번 가닥: 두길 긴뜨기 팝콘 외곽 왼쪽 라인 + 더블 빗금 -->
    <g>
      <path d="M 22 18 C 10 28, 10 48, 32 56" />
      <path d="M 11.5 32.1 L 16.1 34.4" />
      <path d="M 12.5 39.1 L 17.1 41.4" />
    </g>

    <!-- 2번 가닥: 내부 왼쪽 곡선 기둥 + 더블 빗금 (타원 침범 방지) -->
    <g>
      <path d="M 27 22.5 C 23 34, 23 48, 32 56" />
      <path d="M 21.5 32.1 L 26.1 34.4" />
      <path d="M 22.5 39.1 L 27.1 41.4" />
    </g>
    
    <!-- 3번 가닥: 내부 오른쪽 곡선 기둥 + 더블 빗금 (타원 침범 방지) -->
    <g>
      <path d="M 37 22.5 C 41 34, 41 48, 32 56" />
      <path d="M 37.9 32.1 L 42.5 34.4" />
      <path d="M 36.9 39.1 L 41.5 41.4" />
    </g>

    <!-- 4번 가닥: 두길 긴뜨기 팝콘 외곽 오른쪽 라인 + 더블 빗금 -->
    <g>
      <path d="M 42 18 C 54 28, 54 48, 32 56" />
      <path d="M 47.9 32.1 L 52.5 34.4" />
      <path d="M 46.9 39.1 L 51.5 41.4" />
    </g>
  </g>
</svg>
