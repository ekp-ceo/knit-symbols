<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_앞걸어_2코_늘려뜨기
    - KR_NAME_ABBR     : 한길앞걸어2코늘려
    - JA_NAME_FULL     : 長編みの表引き上げ2目編み入れる
    - JA_NAME_ABBR     : 長編表引2目編入
    - EN_NAME_US_FULL  : 2_dc_increase_front_post
    - EN_NAME_US_ABBR  : fpdc_inc
    - EN_NAME_UK_FULL  : 2_tr_increase_front_post
    - EN_NAME_UK_ABBR  : fptr_inc
    - SYMBOL_SHAPE     : v_stem_with_single_centered_front_post_hook
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : front_post_hook_single_root
    - STITCH_RATIO     : 2:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 2
    - CATEGORY          : post_combination
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 앞걸어 2코 늘려뜨기</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 앞걸어 2코 늘려뜨기 실존 기호. 하단 단일 원형 앞걸어 훅에서 분기되는 V자형 사선 기둥 몸통에 각각 사선 빗금을 정렬하고 상단 머리 바를 독립 배치한 11번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 분리된 2개의 수평 머리 바 -->
    <!-- 왼쪽 머리 -->
    <path d="M 14 10 L 28 10" />
    <!-- 오른쪽 머리 -->
    <path d="M 36 10 L 50 10" />

    <!-- 2. V자형 사선 기둥 몸통 -->
    <!-- 왼쪽 사선 기둥: 상단 X=21에서 하단 분기점 X=32로 수렴 -->
    <path d="M 21 10 L 32 30" />
    <!-- 오른쪽 사선 기둥: 상단 X=43에서 하단 분기점 X=32로 수렴 -->
    <path d="M 43 10 L 32 30" />

    <!-- 3. 각 기둥 몸통 중심의 사선 빗금 1개씩 -->
    <!-- 왼쪽 빗금 -->
    <path d="M 22.2 21.0 L 27.8 18.5" />
    <!-- 오른쪽 빗금 -->
    <path d="M 36.2 18.5 L 41.8 21.0" />

    <!-- 4. 하단 단일 뿌리: 가운데 정렬 원형 앞걸어 훅 -->
    <!-- X=32 분기점에서 곧게 내려와 우측으로 감아 돌며 전체 훅의 중심이 기둥 축과 정중앙 정렬 -->
    <path d="M 32 30 L 32 32 C 32 34, 38 34, 40 37 C 43 42, 41 52, 32 52 C 23 52, 23 42, 23 42" />
  </g>
</svg>
