<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - FILE_NAME        : post-030.svg
    - KR_NAME_FULL     : 세길_긴뜨기_교차뜨기_중간_사슬코_오른쪽
    - KR_NAME_ABBR     : 세길교차_중간사슬_오른쪽
    - JA_NAME_FULL     : 三つ巻き長編みの交差編み_間に鎖編み_右
    - JA_NAME_ABBR     : 三つ巻き長編交差_間鎖_右
    - EN_NAME_US_FULL  : treble_crochet_cross_stitch_with_chain_right
    - EN_NAME_US_ABBR  : trc_cross_ch_r
    - SYMBOL_SHAPE     : x_cross_with_top_chain_and_gap
    - SYMBOL_STYLE     : vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : cross_overlapped_right_up_with_chain
    - STITCH_RATIO     : 2:2
    - STITCH_HEIGHT    : 5
    - STITCH_COUNT     : 2
    - CATEGORY          : cross_combination
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>세길 긴뜨기 교차뜨기 (중간 사슬코) - 오른쪽</dc:title>
        <dc:description>보그 코바늘 표준 세길 긴뜨기 교차뜨기 (중간 사슬코) 기호 (오른쪽). 좌상향 기둥이 전면에 오고 상단 사슬 구멍 마스킹 및 기둥당 3줄씩 총 6줄의 사선을 정밀한 데칼코마니 대칭 구조로 최적화한 30번 마스터 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 1. 메인 기둥 및 머리 뼈대 그룹 (기본 두께 4.5px) -->
  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 독립된 머리 바 2개 (80% 스케일) -->
    <path d="M 16.0 14.4 L 25.6 14.4" />
    <path d="M 38.4 14.4 L 48.0 14.4" />

    <!-- X자형 교차 몸통 -->
    <!-- [전면] 왼쪽에서 올라가는 좌상향 기둥 -->
    <path d="M 43.2 49.6 L 20.8 14.4" />
    
    <!-- [후면] 오른쪽에서 올라가는 우상향 기둥 (중앙 마스킹 갭 적용) -->
    <path d="M 20.8 49.6 L 29.0 36.8" />
    <path d="M 35.0 27.2 L 43.2 14.4" />
  </g>

  <!-- 2. 중앙 상단 사슬코 피처 (내부 화이트 마스킹으로 구멍 개방) -->
  <ellipse cx="32.0" cy="14.4" rx="5.0" ry="3.0" fill="#ffffff" stroke="#000000" stroke-width="3.5" />

  <!-- 3. 기둥별 세길 긴뜨기 사선 빗금 세트 (두께 3.15px, 최하단 1번 빗금 추가 이동 및 데칼코마니 대칭) -->
  <g fill="none" stroke="#000000" stroke-width="3.15" stroke-linecap="round" stroke-linejoin="round">
    <!-- [오른쪽 기둥 부하] 오리지널 좌상향 빗금 3줄 -->
    <path d="M 30.0 25.75 L 24.4 28.25" /> <!-- 1번 가장 아래 빗금 (바깥쪽 미세 시프트) -->
    <path d="M 28.5 21.5 L 22.9 24.0" />   <!-- 2번 중간 빗금 -->
    <path d="M 25.5 18.0 L 19.9 20.5" />   <!-- 3번 위쪽 빗금 -->

    <!-- [왼쪽 기둥 부하] 데칼코마니 거울 반전 우상향 빗금 3줄 -->
    <path d="M 34.0 25.75 L 39.6 28.25" /> <!-- 1번 가장 아래 빗금 (바깥쪽 미세 시프트) -->
    <path d="M 35.5 21.5 L 41.1 24.0" />   <!-- 2번 중간 빗금 -->
    <path d="M 38.5 18.0 L 44.1 20.5" />   <!-- 3번 위쪽 빗금 -->
  </g>
</svg>
