<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_5코_팝콘뜨기_한_코에서
    - KR_NAME_ABBR     : 긴5팝콘
    - JA_NAME_FULL     : 中長編み5目のポップコーン編み
    - JA_NAME_ABBR     : 中長5目ポップコーン
    - EN_NAME_US_FULL  : half_double_crochet_5_stitch_popcorn
    - EN_NAME_US_ABBR  : hdc_5_st_popcorn
    - EN_NAME_UK_FULL  : half_treble_crochet_5_stitch_popcorn
    - EN_NAME_UK_ABBR  : htr_5_st_popcorn
    - SYMBOL_SHAPE     : flat_oval_top_ring_with_outer_shell_enclosing_3_inner_bars
    - SYMBOL_STYLE     : hdc_5_popcorn_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : popcorn_top_ring
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 2
    - STITCH_COUNT     : 5
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 5코 팝콘뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 5코 팝콘뜨기 (한 코에서) 기호. 동일한 상단 타원 링과 하단 수렴점 규격 안에서 총 5가닥의 기둥(외곽 2, 내측 곡선 2, 중앙 수직 1)이 흐트러짐 없이 촘촘하고 균형 있게 배열된 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 가로형 타원 링 (머리 고리) -->
    <path d="M 32 16 C 40 16, 43 19, 42 22 C 40 25, 24 25, 22 22 C 21 19, 24 16, 32 16 Z" />

    <!-- 1번 가닥: 팝콘 외곽 왼쪽 라인 (타원 왼쪽 끝에서 하단 중심 32,54로) -->
    <path d="M 22 22 C 12 30, 12 48, 32 54" />

    <!-- 2번 가닥: 내부 왼쪽 곡선 기둥 (Y=24.5에서 시작) -->
    <path d="M 26 24.5 C 22 34, 22 47, 32 54" />
    
    <!-- 3번 가닥: 정중앙 수직 기둥 (Y=25에서 곧게 직선 낙하) -->
    <path d="M 32 25 L 32 54" />

    <!-- 4번 가닥: 내부 오른쪽 곡선 기둥 (Y=24.5에서 시작) -->
    <path d="M 38 24.5 C 42 34, 42 47, 32 54" />

    <!-- 5번 가닥: 팝콘 외곽 오른쪽 라인 (타원 오른쪽 끝에서 하단 중심 32,54로) -->
    <path d="M 42 22 C 52 30, 52 48, 32 54" />
  </g>
</svg>
