<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - FILE_NAME        : ch-start-01.svg
    - KR_NAME_FULL     : 긴뜨기_2코_늘려뜨기_시작코
    - KR_NAME_ABBR     : 긴뜨기2코늘려_시작코
    - JA_NAME_FULL     : 中長編みの2目編み入れる_立ち上がり
    - JA_NAME_ABBR     : 中長2目入れる_立ち上がり
    - EN_NAME_US_FULL  : half_double_crochet_2_stitch_increase_with_chain_start
    - EN_NAME_US_ABBR  : hdc_2inc_ch_start
    - SYMBOL_SHAPE     : v_fork_with_flat_bottom_and_perfect_aligned_chain
    - SYMBOL_STYLE     : vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_root_asymmetric_aligned_slim_chain
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 2
    - CATEGORY          : chain_start_column
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 2코 늘려뜨기_시작코</dc:title>
        <dc:description>보그 코바늘 표준 [사슬 포함 시작코(ch-start)] 카테고리의 1번 마스터 기호. 사슬 2개를 35도 각도로 배치하고, 상단 사슬코를 우측으로 0.5px 이동시켜 정교하게 정렬된 8자 사슬 기둥을 완성한 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 1. 좌측 일반 긴뜨기 기둥 그룹 (기본 두께 4.5px, 바닥 수직 바 제거 완료) -->
  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 좌측 긴뜨기 상단 머리 바 -->
    <path d="M 12.0 16.0 L 22.0 16.0" />

    <!-- 좌측 긴뜨기 메인 경사 기둥 (바닥점 32.0, 49.6) -->
    <path d="M 32.0 49.6 L 17.0 16.0" />
  </g>

  <!-- 2. 우측 시작 사슬코 기둥 세트 (35도 경사 유지 + 상단 사슬 최종 미세 튜닝) -->
  <!-- 사슬 외곽선 3.5px, 내부 fill="#ffffff"로 구멍 개방 효과 극대화 -->
  <g stroke="#000000" stroke-width="3.5" fill="#ffffff" stroke-linejoin="round">
    <!-- 하단 사슬코 (바닥 위치 수평 정렬 고정) -->
    <ellipse cx="37.0" cy="42.2" rx="3.5" ry="8.5" transform="rotate(35 37.0 42.2)" />
    
    <!-- 상단 사슬코 (우측 0.5px 미세 이동 cx: 46.7 -> 47.2 / cy: 25.5 고정 및 회전축 동기화) -->
    <ellipse cx="47.2" cy="25.5" rx="3.5" ry="8.5" transform="rotate(35 47.2 25.5)" />
  </g>
</svg>
