<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길긴뜨기_3코_늘려뜨기_한_코에서
    - KR_NAME_ABBR     : 한길3늘려_코
    - JA_NAME_FULL     : 長編み3目編み入れる_目に
    - JA_NAME_ABBR     : 長2増し_目
    - EN_NAME_US_FULL  : double_crochet_3_stitch_increase_into_stitch
    - EN_NAME_US_ABBR  : dc_3_st_inc
    - EN_NAME_UK_FULL  : treble_crochet_3_stitch_increase_into_stitch
    - EN_NAME_UK_ABBR  : tr_3_st_inc
    - SYMBOL_SHAPE     : 3_branched_v_shape_with_slashes
    - SYMBOL_STYLE     : dc_3_branched_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 3
    - CATEGORY          : inc
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길긴뜨기 3코 늘려뜨기(한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 기호. 하단 한 점(32, 54)에서 위로 3개의 한길긴뜨기 기둥이 부채꼴 형태로 뻗어나가며, 사선 빗금이 전체 높이의 '중간에서 조금 더 위' 지점에 정갈하게 위치한 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 하단 한 점(32, 54)에서 뻗어나가는 3개의 부채꼴 기둥선 -->
    <path d="M 16 16 L 32 54"/>
    <path d="M 32 16 L 32 54"/>
    <path d="M 48 16 L 32 54"/>
    
    <!-- 상단 수평 바 (-) 콤팩트한 사이즈 유지 -->
    <path d="M 12 16 L 20 16"/>
    <path d="M 28 16 L 36 16"/>
    <path d="M 44 16 L 52 16"/>
    
    <!-- [빗금 위치 조정] 빗금을 '중간에서 아주 조금 더 위' 지점(Y:27~31)으로 미세 수정 -->
    <!-- 왼쪽 기둥 사선 빗금 (기둥 선 X:21.5, Y:29 지점을 정확히 관통) -->
    <path d="M 18 27 L 25 31"/>
    
    <!-- 중앙 기둥 사선 빗금 (기둥 선 X:32, Y:29 지점을 정확히 관통) -->
    <path d="M 28 27 L 35 31"/>
    
    <!-- 오른쪽 기둥 사선 빗금 (기둥 선 X:42.5, Y:29 지점을 정확히 관통) -->
    <path d="M 39 27 L 46 31"/>
  </g>
</svg>
