<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 두길_긴뜨기_2코_팝콘뜨기_한_코에서
    - KR_NAME_ABBR     : 두길2팝콘
    - JA_NAME_FULL     : 長々編み2目のポップコーン編み
    - JA_NAME_ABBR     : 長々2目ポップコーン
    - EN_NAME_US_FULL  : treble_crochet_2_stitch_popcorn
    - EN_NAME_US_ABBR  : tr_2_st_popcorn
    - EN_NAME_UK_FULL  : double_treble_crochet_2_stitch_popcorn
    - EN_NAME_UK_ABBR  : dtr_2_st_popcorn
    - SYMBOL_SHAPE     : flat_oval_top_ring_with_2_outer_shell_paths_and_double_slashes
    - SYMBOL_STYLE     : tr_2_popcorn_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : popcorn_top_ring
    - STITCH_RATIO     : 1:4
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 2
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길 긴뜨기 2코 팝콘뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 두길 긴뜨기 2코 팝콘뜨기 (한 코에서) 기호. 내부 기둥 없이 외곽 2가닥 선에 각각 두길 긴뜨기를 뜻하는 2개의 사선 빗금을 적용하고, 캔버스 중심축 정렬을 완벽하게 맞춘 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 가로형 타원 링 (머리 고리 - 두길 긴뜨기의 비례를 위해 Y=12로 상향 고정) -->
    <path d="M 32 12 C 40 12, 43 15, 42 18 C 40 21, 24 21, 22 18 C 21 15, 24 12, 32 12 Z" />

    <!-- 1번 가닥: 두길 긴뜨기 팝콘 외곽 왼쪽 라인 + 더블 빗금 (2개) -->
    <g>
      <path d="M 22 18 C 10 28, 10 48, 32 56" />
      <!-- 곡선 흐름에 맞춘 더블 빗금 설정 (Y=32선과 Y=38선 근처) -->
      <path d="M 11.5 32.1 L 16.1 34.4" />
      <path d="M 12.5 39.1 L 17.1 41.4" />
    </g>

    <!-- 2번 가닥: 두길 긴뜨기 팝콘 외곽 오른쪽 라인 + 더블 빗금 (2개) -->
    <g>
      <path d="M 42 18 C 54 28, 54 48, 32 56" />
      <!-- 곡선 흐름에 맞춘 더블 빗금 설정 (Y=32선과 Y=38선 근처) -->
      <path d="M 47.9 32.1 L 52.5 34.4" />
      <path d="M 46.9 39.1 L 51.5 41.4" />
    </g>
  </g>
</svg>
