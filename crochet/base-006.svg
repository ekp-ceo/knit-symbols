<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 두길긴뜨기
    - KR_NAME_ABBR     : 두길긴
    - JA_NAME_FULL     : 長々編み
    - JA_NAME_ABBR     : 長々
    - EN_NAME_US_FULL  : treble_crochet
