  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길긴뜨기</dc:title>
        <dc:description>보그 코바늘 표준 두길긴뜨기 기호. T자 기둥 중앙에 사선이 2개 교차하는 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 64x64 해상도에 맞춘 두길긴뜨기 그래픽 -->
