<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 두길_긴뜨기_3코_구슬뜨기_코_아래에서
    - KR_NAME_ABBR     : 두길3구슬_아래
    - JA_NAME_FULL     : 長々編み3目の玉編み_下
    - JA_NAME_ABBR     : 長々3目玉編み_下
    - EN_NAME_US_FULL  : triple_crochet_3_stitch_bobble_from_below
    - EN_NAME_US_ABBR  : tr_3_st_bobble_blw
    - EN_NAME_UK_FULL  : double_treble_crochet_3_stitch_bobble_from_below
    - EN_NAME_UK_ABBR  : dtr_3_st_bobble_blw
    - SYMBOL_SHAPE     : 3_branched_inverted_open_oval_shape_with_center_bar_top_bar_and_double_slashes
    - SYMBOL_STYLE     : tr_3_bobble_open_base
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:4
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 3
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길 긴뜨기 3코 구슬뜨기 (코 아래에서)</dc:title>
        <dc:description>보그 코바늘 표준 두길 긴뜨기 3코 구슬뜨기 (코 아래에서) 기호. 구슬뜨기(pop) 카테고리의 열다섯 번째 도안. 모든 빗물을 아래로 2px 내리고, 최외곽인 1번과 3번 기둥의 더블 빗금을 바깥 방향으로 각각 2px 수평 이동하여 기둥 곡선과의 조화로움을 정밀하게 맞춘 최종 마스터 마그나 버전.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(1.26) translate(-32, -32) translate(0, 2)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 1번 기둥 (왼쪽 외곽 곡선 및 더블 빗금 - 빗금 하향 및 바깥 이동) -->
    <g>
      <path d="M 32 20 C 13 28, 13 44, 18.5 52"/>
      <!-- Y축+2, X축-2 이동 (16.5/32.1 -> 14.5/34.1, etc.) -->
      <path d="M 14.5 34.1 L 19.1 36.4"/>
      <path d="M 13.5 39.1 L 18.1 41.4"/>
    </g>
    
    <!-- 2번 기둥 (정중앙 수직 직선 다리 및 더블 빗금 - 빗금 하향) -->
    <g>
      <path d="M 32 20 L 32 52"/>
      <!-- Y축+2 이동 (32.3 -> 34.3, etc.) -->
      <path d="M 29.7 34.3 L 34.3 36.9"/>
      <path d="M 29.7 39.3 L 34.3 41.9"/>
    </g>
    
    <!-- 3번 기둥 (오른쪽 외곽 곡선 및 더블 빗금 - 빗금 하향 및 바깥 이동) -->
    <g>
      <path d="M 32 20 C 51 28, 51 44, 45.5 52"/>
      <!-- Y축+2, X축+2 이동 (42.9/32.1 -> 44.9/34.1, etc.) -->
      <path d="M 44.9 34.1 L 49.5 36.4"/>
      <path d="M 45.9 39.1 L 50.5 41.4"/>
    </g>
  </g>
</svg>
