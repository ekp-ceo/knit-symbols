<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_2코_팝콘뜨기_한_코에서
    - KR_NAME_ABBR     : 한길2팝콘
    - JA_NAME_FULL     : 長編み2目のポップコーン編み
    - JA_NAME_ABBR     : 長編2目ポップコーン
    - EN_NAME_US_FULL  : double_crochet_2_stitch_popcorn
    - EN_NAME_US_ABBR  : dc_2_st_popcorn
    - EN_NAME_UK_FULL  : treble_crochet_2_stitch_popcorn
    - EN_NAME_UK_ABBR  : tr_2_st_popcorn
    - SYMBOL_SHAPE     : flat_oval_top_ring_with_2_outer_shell_paths_and_single_slashes
    - SYMBOL_STYLE     : dc_2_popcorn_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : popcorn_top_ring
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 2
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 2코 팝콘뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 2코 팝콘뜨기 (한 코에서) 기호. 외곽 2가닥 선에 얹어진 한길 긴뜨기 사선 빗금들을 바깥 방향으로 각각 2px 수평 이동하여 기둥 중심부와 완벽하게 일치시킨 정밀 마감 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 가로형 타원 링 (머리 고리) -->
    <path d="M 32 10 C 40 10, 43 13, 42 16 C 40 19, 24 19, 22 16 C 21 13, 24 10, 32 10 Z" />

    <!-- 1번 가닥: 한길 긴뜨기 팝콘 외곽 왼쪽 라인 (하단 빗금 바깥으로 2px 이동) -->
    <g>
      <path d="M 22 16 C 10 26, 10 48, 32 56" />
      <!-- X축 좌측으로 2px 이동 (13.5/18.1 -> 11.5/16.1) -->
      <path d="M 11.5 33.0 L 16.1 35.5" />
    </g>

    <!-- 2번 가닥: 한길 긴뜨기 팝콘 외곽 오른쪽 라인 (하단 빗금 바깥으로 2px 이동) -->
    <g>
      <path d="M 42 16 C 54 26, 54 48, 32 56" />
      <!-- X축 우측으로 2px 이동 (45.9/50.5 -> 47.9/52.5) -->
      <path d="M 47.9 33.0 L 52.5 35.5" />
    </g>
  </g>
</svg>
