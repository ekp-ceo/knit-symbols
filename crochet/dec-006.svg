<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_5코_모아뜨기
    - KR_NAME_ABBR     : 긴5모아
    - JA_NAME_FULL     : 中長編み5目一度
    - JA_NAME_ABBR     : 中長5目一度
    - EN_NAME_US_FULL  : half_double_crochet_5_stitch_decrease
    - EN_NAME_US_ABBR  : hdc_5_st_inc
    - EN_NAME_UK_FULL  : half_treble_crochet_5_stitch_decrease
    - EN_NAME_UK_ABBR  : htr_5_st_inc
    - SYMBOL_SHAPE     : 5_branched_inverted_fan_with_top_bar
    - SYMBOL_STYLE     : hdc_5_together_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 2
    - STITCH_COUNT     : 5
    - CATEGORY          : dec
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 5코 모아뜨기</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 5코 모아뜨기 기호. 모아뜨기(dec) 카테고리의 여섯 번째 도안. 상단 꼭짓점(32, 20) 수렴점과 수평 바 아래로, 20번 도안의 미세 검증된 황금 대칭 각도를 역방향 적용하여 정렬한 최종 마스터 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- [0.81 스케일 및 캔버스 센터 정렬 밸런스 완벽 유지] -->
  <g transform="translate(32, 32) scale(0.81) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 상단 긴뜨기 머리 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 모든 기둥의 상단 수렴 중심점을 (32, 20)으로 고정하고 회전 연산 배치 -->
    <!-- 1번 기둥: 왼쪽 끝 (-37.5도) -->
    <g transform="rotate(-37.5, 32, 20)">
      <path d="M 32 20 L 32 52"/>
    </g>

    <!-- 2번 기둥: 왼쪽 안 (-19도) -->
    <g transform="rotate(-19, 32, 20)">
      <path d="M 32 20 L 32 52"/>
    </g>

    <!-- 3번 기둥: 정중앙 수직 기둥 (0도 고정) -->
    <g>
      <path d="M 32 20 L 32 52"/>
    </g>

    <!-- 4번 기둥: 오른쪽 안 (19도) -->
    <g transform="rotate(19, 32, 20)">
      <path d="M 32 20 L 32 52"/>
    </g>

    <!-- 5번 기둥: 오른쪽 끝 (37.5도) -->
    <g transform="rotate(37.5, 32, 20)">
      <path d="M 32 20 L 32 52"/>
    </g>

  </g>
</svg>
