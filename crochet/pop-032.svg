<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 두길_긴뜨기_5코_팝콘뜨기_한_코에서
    - KR_NAME_ABBR     : 두길5팝콘
    - JA_NAME_FULL     : 長々編み5目のポップコーン編み
    - JA_NAME_ABBR     : 長々5目ポップコーン
    - EN_NAME_US_FULL  : treble_crochet_5_stitch_popcorn
    - EN_NAME_US_ABBR  : tr_5_st_popcorn
    - EN_NAME_UK_FULL  : double_treble_crochet_5_stitch_popcorn
    - EN_NAME_UK_ABBR  : dtr_5_st_popcorn
    - SYMBOL_SHAPE     : flat_oval_top_ring_with_outer_shell_enclosing_3_inner_bars_with_double_slashes
    - SYMBOL_STYLE     : tr_5_popcorn_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : popcorn_top_ring
    - STITCH_RATIO     : 1:4
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 5
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길 긴뜨기 5코 팝콘뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 두길 긴뜨기 5코 팝콘뜨기 (한 코에서) 기호. 통일된 상단 타원 링 규격 안에서 두길 긴뜨기 더블 빗금이 각각 포함된 총 5가닥의 기둥(외곽 2, 내측 곡선 2, 중앙 수직 1)이 높은 밀도 속에서도 균형 있게 배열된 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 가로형 타원 링 (머리 고리) -->
    <path d="M 32 12 C 40 12, 43 15, 42 18 C 40 21, 24 21, 22 18 C 21 15, 24 12, 32 12 Z" />

    <!-- 1번 가닥: 팝콘 외곽 왼쪽 라인 + 더블 빗금 -->
    <g>
      <path d="M 22 18 C 10 28, 10 48, 32 56" />
      <path d="M 11.5 32.1 L 16.1 34.4" />
      <path d="M 12.5 39.1 L 17.1 41.4" />
    </g>

    <!-- 2번 가닥: 내부 왼쪽 곡선 기둥 + 더블 빗금 -->
    <g>
      <path d="M 26 22.5 C 22 34, 22 48, 32 56" />
      <path d="M 21.0 32.1 L 25.6 34.4" />
      <path d="M 22.0 39.1 L 26.6 41.4" />
    </g>
    
    <!-- 3번 가닥: 정중앙 수직 기둥 + 더블 빗금 -->
    <g>
      <path d="M 32 23 L 32 56" />
      <path d="M 29.7 32.1 L 34.3 34.7" />
      <path d="M 29.7 39.1 L 34.3 41.7" />
    </g>

    <!-- 4번 가닥: 내부 오른쪽 곡선 기둥 + 더블 빗금 -->
    <g>
      <path d="M 38 22.5 C 42 34, 42 48, 32 56" />
      <path d="M 38.4 32.1 L 43.0 34.4" />
      <path d="M 37.4 39.1 L 42.0 41.4" />
    </g>

    <!-- 5번 가닥: 팝콘 외곽 오른쪽 라인 + 더블 빗금 -->
    <g>
      <path d="M 42 18 C 54 28, 54 48, 32 56" />
      <path d="M 47.9 32.1 L 52.5 34.4" />
      <path d="M 46.9 39.1 L 51.5 41.4" />
