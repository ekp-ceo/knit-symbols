<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길긴뜨기_5코_늘려뜨기_한_코에서
    - KR_NAME_ABBR     : 한길5늘려_코
    - JA_NAME_FULL     : 長編み5目編み入れる_目に
    - JA_NAME_ABBR     : 長5目入れ_目
    - EN_NAME_US_FULL  : double_crochet_5_stitch_increase_into_stitch
    - EN_NAME_US_ABBR  : dc_5_st_inc
    - EN_NAME_UK_FULL  : treble_crochet_5_stitch_increase_into_stitch
    - EN_NAME_UK_ABBR  : tr_5_st_inc
    - SYMBOL_SHAPE     : 5_perfect_balanced_rotated_basic_dc_bars_converging_at_bottom
    - SYMBOL_STYLE     : dc_5_branched_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 5
    - CATEGORY          : inc
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길긴뜨기 5코 늘려뜨기(한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 기호. 하단 수렴 구조와 황금 각도(37.5도, 19도), 80% 축소된 빗금 너비(6.4px)를 유지한 상태에서, 빗금의 Y축 위치를 위로 1.5px 상향 조정하여 기둥 중심부의 시각적 밸런스를 극대화한 최종 완성본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- [축소 및 캔버스 센터 정렬 밸런스 완벽 유지] -->
  <g transform="translate(32, 32) scale(0.81) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 
      [빗금 Y축 1.5px 상향 조정 반영]
      - 기존: M 28.8 27.2 L 35.2 30.8
      - 변경: M 28.8 25.7 L 35.2 29.3 (Y축 -1.5 적용)
    -->

    <!-- 1번 기둥: 왼쪽 끝 (-37.5도) -->
    <g transform="rotate(-37.5, 32, 54)">
      <path d="M 32 16 L 32 54"/>
      <path d="M 28 16 L 36 16"/>
      <path d="M 28.8 25.7 L 35.2 29.3"/>
    </g>

    <!-- 2번 기둥: 왼쪽 안 (-19도) -->
    <g transform="rotate(-19, 32, 54)">
      <path d="M 32 16 L 32 54"/>
      <path d="M 28 16 L 36 16"/>
      <path d="M 28.8 25.7 L 35.2 29.3"/>
    </g>

    <!-- 3번 기둥: 정중앙 수직 기둥 (0도 고정) -->
    <g>
      <path d="M 32 16 L 32 54"/>
      <path d="M 28 16 L 36 16"/>
      <path d="M 28.8 25.7 L 35.2 29.3"/>
    </g>

    <!-- 4번 기둥: 오른쪽 안 (19도) -->
    <g transform="rotate(19, 32, 54)">
      <path d="M 32 16 L 32 54"/>
      <path d="M 28 16 L 36 16"/>
      <path d="M 28.8 25.7 L 35.2 29.3"/>
    </g>

    <!-- 5번 기둥: 오른쪽 끝 (37.5도) -->
    <g transform="rotate(37.5, 32, 54)">
      <path d="M 32 16 L 32 54"/>
      <path d="M 28 16 L 36 16"/>
      <path d="M 28.8 25.7 L 35.2 29.3"/>
    </g>

  </g>
</svg>
