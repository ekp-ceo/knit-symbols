<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_5코_구슬뜨기_한_코에서
    - KR_NAME_ABBR     : 한길5구슬
    - JA_NAME_FULL     : 長編み5目の玉編み
    - JA_NAME_ABBR     : 長5目玉編み
    - EN_NAME_US_FULL  : double_crochet_5_stitch_bobble
    - EN_NAME_US_ABBR  : dc_5_st_bobble
    - EN_NAME_UK_FULL  : treble_crochet_5_stitch_bobble
    - EN_NAME_UK_ABBR  : tr_5_st_bobble
    - SYMBOL_SHAPE     : 5_branched_oval_almond_shape_with_center_bar_top_bar_and_slashes
    - SYMBOL_STYLE     : dc_5_bobble_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 5
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 5코 구슬뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 5코 구슬뜨기 (한 코에서) 기호. 구슬뜨기(pop) 카테고리의 열두 번째 도안. 오른쪽 내측 4번 기둥의 단선 빗금을 위로 0.5px 미세 수직 이동하여 빗물 곡선 정렬을 정밀하게 다듬은 최종 완성본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(1.26) translate(-32, -32) translate(0, 2)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 1번 기둥 (왼쪽 외곽 곡선 및 빗금) -->
    <g>
      <path d="M 32 20 C 11 28, 11 44, 32 52"/>
      <path d="M 13.5 35.1 L 18.1 37.4"/>
    </g>
    
    <!-- 2번 기둥 (왼쪽 내측 곡선 및 빗금) -->
    <g>
      <path d="M 32 20 C 21 28, 21 44, 32 52"/>
      <path d="M 21.5 35.1 L 26.1 37.4"/>
    </g>
    
    <!-- 3번 기둥 (정중앙 수직 직선 다리 및 빗금) -->
    <g>
      <path d="M 32 20 L 32 52"/>
      <path d="M 29.7 35.3 L 34.3 37.9"/>
    </g>
    
    <!-- 4번 기둥 (오른쪽 내측 곡선 및 빗금 - 0.5px 상향 미세 조정) -->
    <g>
      <path d="M 32 20 C 43 28, 43 44, 32 52"/>
      <!-- Y축을 0.5px 위로 올림 (36.1/38.4 -> 35.6/37.9) -->
      <path d="M 37.9 35.6 L 42.5 37.9"/>
    </g>
    
    <!-- 5번 기둥 (오른쪽 외곽 곡선 및 빗금) -->
    <g>
      <path d="M 32 20 C 53 28, 53 44, 32 52"/>
      <path d="M 45.9 35.1 L 50.5 37.4"/>
    </g>
  </g>
</svg>
