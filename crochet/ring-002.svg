<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 원형_사슬_6코
    - KR_NAME_ABBR     : 원형사슬_6
    - JA_NAME_FULL     : 鎖の輪作り目6目
    - JA_NAME_ABBR     : 鎖輪6
    - EN_NAME_US_FULL  : chain_ring_6_stitches
    - EN_NAME_US_ABBR  : ch_ring_6
    - EN_NAME_UK_FULL  : chain_ring_6_stitches
    - EN_NAME_UK_ABBR  : ch_ring_6
    - SYMBOL_SHAPE     : ring_chains
    - SYMBOL_STYLE     : 6_stitches
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : center
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:1
    - STITCH_HEIGHT    : 1
    - STITCH_COUNT     : 6
    - CATEGORY         : ring
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>원형 사슬 6코</dc:title>
        <dc:description>보그 코바늘 표준 원형 사슬 6코 기호. 6개의 사슬이 원형으로 배치된 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 60도 간격으로 정밀 회전 배치된 6개의 사슬뜨기(타원) -->
  <g fill="none" stroke="#000000" stroke-width="3">
    <!-- 0도 (상단) -->
    <ellipse cx="32" cy="15" rx="8" ry="4" transform="rotate(0 32 32)"/>
    <!-- 60도 -->
    <ellipse cx="32" cy="15" rx="8" ry="4" transform="rotate(60 32 32)"/>
    <!-- 120도 -->
    <ellipse cx="32" cy="15" rx="8" ry="4" transform="rotate(120 32 32)"/>
    <!-- 180도 (하단) -->
    <ellipse cx="32" cy="15" rx="8" ry="4" transform="rotate(180 32 32)"/>
    <!-- 240도 -->
    <ellipse cx="32" cy="15" rx="8" ry="4" transform="rotate(240 32 32)"/>
    <!-- 300도 -->
    <ellipse cx="32" cy="15" rx="8" ry="4" transform="rotate(300 32 32)"/>
  </g>
</svg>
