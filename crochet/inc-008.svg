<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길긴뜨기_2코_늘려뜨기_한_코에서
    - KR_NAME_ABBR     : 한길2늘려_코
    - JA_NAME_FULL     : 長編み2目編み入れる_目に
    - JA_NAME_ABBR     : 長2増し_目
    - EN_NAME_US_FULL  : double_crochet_increase_into_stitch
    - EN_NAME_US_ABBR  : dc_inc
    - EN_NAME_UK_FULL  : treble_crochet_increase_into_stitch
    - EN_NAME_UK_ABBR  : tr_inc
    - SYMBOL_SHAPE     : v_with_separated_t_bars_and_slashes
    - SYMBOL_STYLE     : dc_branched_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 2
    - CATEGORY         : inc
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길긴뜨기 2코 늘려뜨기_한 코에서</dc:title>
        <dc:description>보그 코바늘 표준 기호. 하단 한 점으로 모이는 V자 기둥과 상단 분리형 T바, 그리고 각 기둥 중심에 사선 빗금이 추가된 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 높이 Y축 14~52 범위에서 뻗어나가는 정갈한 한길긴뜨기 2코 늘려뜨기 구조 -->
  <g fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 하단 한 점(32, 52)에서 상단 각 위치(18, 14), (46, 14)로 뻗어 모이는 V자 기둥선 -->
    <path d="M 18 14 L 32 52 L 46 14"/>
    
    <!-- 왼쪽 기둥의 독립된 상단 수평 바 (중심 18, Y축 14) -->
    <path d="M 11 14 L 25 14"/>
    
    <!-- 오른쪽 기둥의 독립된 상단 수평 바 (중심 46, Y축 14) -->
    <path d="M 39 14 L 53 14"/>
    
    <!-- 왼쪽 기둥 중심 사선 빗금 (기둥 기울기에 맞추어 정밀 커팅) -->
    <path d="M 21 31 L 28 35"/>
    
    <!-- 오른쪽 기둥 중심 사선 빗금 (기둥 기울기에 맞추어 정밀 커팅) -->
    <path d="M 36 35 L 43 31"/>
  </g>
</svg>
