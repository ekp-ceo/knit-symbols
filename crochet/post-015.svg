<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_앞걸어_2코_모아뜨기
    - KR_NAME_ABBR     : 한길앞걸어2코모아
    - JA_NAME_FULL     : 長編みの表引き上げ2目一度
    - JA_NAME_ABBR     : 長編表引2目一度
    - EN_NAME_US_FULL  : front_post_double_crochet_2_together
    - EN_NAME_US_ABBR  : fpdc2tog
    - EN_NAME_UK_FULL  : front_post_treble_crochet_2_together
    - EN_NAME_UK_ABBR  : fptr2tog
    - SYMBOL_SHAPE     : inverted_v_stem_with_isolated_dual_front_post_hooks
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : front_post_hook_dual_root
    - STITCH_RATIO     : 2:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 2
    - CATEGORY          : post_combination
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 앞걸어 2코 모아뜨기</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 앞걸어 2코 모아뜨기 실존 기호. 벌어진 기둥 축에 맞춰 좌우 빗금을 각각 0.5px 바깥쪽으로 수평 이동하고, 위로 1px 추가 수직 상향하여 모아뜨기 기하학적 밸런스를 극대화한 15번 마스터 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 공통 수평 머리 바 -->
    <path d="M 22 10 L 42 10" />

    <!-- 2. Lambda(Λ)자형 모아뜨기 기둥 몸통 -->
    <path d="M 21.0 34 L 32 10" />
    <path d="M 43.0 34 L 32 10" />

    <!-- 3. 몸통 사선 빗금 2개 (수직 1px 상향 이동 적용: Y축 -1) -->
    <!-- 1번(좌측) 빗금: Y축 28.0/25.5 -> 27.0/24.5 -->
    <path d="M 21.9 27.0 L 27.5 24.5" />
    <!-- 2번(우측) 빗금: Y축 25.5/28.0 -> 24.5/27.0 -->
    <path d="M 36.5 24.5 L 42.1 27.0" />

    <!-- 4. 하단 두 다리의 독립형 원형 앞걸어 훅 -->
    <path d="M 21.0 34 L 21.0 36 C 21.0 38, 27.0 38, 29.0 41 C 31.0 46, 29.0 54, 21.0 54 C 13.0 54, 13.0 46, 13.0 46" />
    <path d="M 43.0 34 L 43.0 36 C 43.0 38, 49.0 38, 51.0 41 C 53.0 46, 51.0 54, 43.0 54 C 35.0 54, 35.0 46, 35.0 46" />
  </g>
