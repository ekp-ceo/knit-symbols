<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 두길_긴뜨기_2코_모아_이랑뜨기
    - KR_NAME_ABBR     : 두길2코모아이랑
    - JA_NAME_FULL     : 長々編み2目一度의畝編み_すじ編み
    - JA_NAME_ABBR     : 長々2目一度畝編み
    - EN_NAME_US_FULL  : treble_crochet_2_stitch_decrease_back_loop_only
    - EN_NAME_US_ABBR  : tr_2_st_inc_blo
    - EN_NAME_UK_FULL  : double_treble_crochet_2_stitch_decrease_back_loop_only
    - EN_NAME_UK_ABBR  : dtr_2_st_inc_blo
    - SYMBOL_SHAPE     : inverted_v_shape_cross_marks_with_fine_tuned_double_slashes_and_bottom_flat_rib_bar
    - SYMBOL_STYLE     : ribbed_decrease_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_rib_bar
    - STITCH_RATIO     : 1:4
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 2
    - CATEGORY          : rib
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길 긴뜨기 2코 모아 이랑뜨기</dc:title>
        <dc:description>보그 코바늘 표준 두길 긴뜨기 2코 모아 이랑뜨기 실존 기호. 상단 빗금들을 안쪽으로 0.5px 정밀 미세 이동하여 사선 기둥 몸통과의 결합도를 극대화하고 획의 분리도를 유지한 13번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 두길 긴뜨기 2코 모아뜨기 (상단 빗금 안쪽 0.5px 미세 이동) -->
    <!-- 왼쪽 기둥 및 조정된 2개의 빗금 획 -->
    <path d="M 21 38 L 32 16" />
    <!-- 상단 빗금: 안쪽(오른쪽)으로 0.5px 이동 -->
    <path d="M 23.0 26.5 L 29.0 23.5" />
    <!-- 하단 빗금: 바깥쪽 유지 -->
    <path d="M 21.0 33.5 L 27.0 30.5" />

    <!-- 오른쪽 기둥 및 조정된 2개의 미러링 빗금 획 -->
    <path d="M 43 38 L 32 16" />
    <!-- 상단 빗금: 안쪽(왼쪽)으로 0.5px 이동 -->
    <path d="M 35.0 23.5 L 41.0 26.5" />
    <!-- 하단 빗금: 바깥쪽 유지 -->
    <path d="M 37.0 30.5 L 43.0 33.5" />

    <!-- 2. 하단 이랑뜨기 가로 받침대 (Flat Rib Bar) -->
    <path d="M 16 48 L 48 48" />
  </g>
</svg>
