<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 세길_긴뜨기_2코_모아_이랑뜨기
    - KR_NAME_ABBR     : 세길2코모아이랑
    - JA_NAME_FULL     : 長々々編み2目一度の畝編み_すじ編み
    - JA_NAME_ABBR     : 長々々2目一度畝編み
    - EN_NAME_US_FULL  : double_treble_crochet_2_stitch_decrease_back_loop_only
    - EN_NAME_US_ABBR  : dtr_2_st_dec_blo
    - EN_NAME_UK_FULL  : triple_treble_crochet_2_stitch_decrease_back_loop_only
    - EN_NAME_UK_ABBR  : trtr_2_st_dec_blo
    - SYMBOL_SHAPE     : inverted_v_shape_cross_marks_with_staggered_triple_slashes_and_bottom_flat_rib_bar
    - SYMBOL_STYLE     : ribbed_decrease_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_rib_bar
    - STITCH_RATIO     : 1:5
    - STITCH_HEIGHT    : 5
    - STITCH_COUNT     : 2
    - CATEGORY          : rib
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>세길 긴뜨기 2코 모아 이랑뜨기</dc:title>
        <dc:description>보그 코바늘 표준 세길 긴뜨기 2코 모아 이랑뜨기 실존 기호. 역V자형 기둥을 따라 총 6개의 빗금 획이 상단(안쪽 밀착), 중단(센터), 하단(바깥 오프셋)으로 흐르듯 균등 분리되어 AI의 개별 획 인지력을 극대화한 14번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 세길 긴뜨기 2코 모아뜨기 -->
    <!-- 왼쪽 기둥 및 단계별 정렬된 3개의 빗금 획 -->
    <path d="M 21 38 L 32 16" />
    <!-- 빗금 1 (상단): 안쪽 밀착 정렬 -->
    <path d="M 23.5 24.5 L 29.5 21.5" />
    <!-- 빗금 2 (중단): 기둥 센터 정렬 -->
    <path d="M 22.0 30.0 L 28.0 27.0" />
    <!-- 빗금 3 (하단): 바깥쪽(왼쪽) 오프셋 정렬 -->
    <path d="M 20.5 35.5 L 26.5 32.5" />

    <!-- 오른쪽 기둥 및 단계별 정렬된 3개의 미러링 빗금 획 -->
    <path d="M 43 38 L 32 16" />
    <!-- 빗금 1 (상단): 안쪽 밀착 정렬 -->
    <path d="M 34.5 21.5 L 40.5 24.5" />
    <!-- 빗금 2 (중단): 기둥 센터 정렬 -->
    <path d="M 36.0 27.0 L 42.0 30.0" />
    <!-- 빗금 3 (하단): 바깥쪽(오른쪽) 오프셋 정렬 -->
    <path d="M 37.5 32.5 L 43.5 35.5" />

    <!-- 2. 하단 이랑뜨기 가로 받침대 (Flat Rib Bar) -->
    <path d="M 16 48 L 48 48" />
  </g>
</svg>
