    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 교차뜨기 (중간 사슬코) - 왼쪽</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 교차뜨기 (중간 사슬코) 기호 (왼쪽). 상단 머리 바 사이에 구멍이 선명하게 뚫린 사슬코(타원) 피처를 마스킹 레이어로 조합하여 시각적 명확성을 완성한 25번 마스터 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 1. 메인 기둥 및 머리 뼈대 그룹 -->
  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 독립된 머리 바 2개 -->
    <path d="M 16.0 14.4 L 25.6 14.4" />
    <path d="M 38.4 14.4 L 48.0 14.4" />

    <!-- X자형 교차 몸통 -->
    <path d="M 20.8 49.6 L 43.2 14.4" />
    <path d="M 43.2 49.6 L 35.0 36.8" />
    <path d="M 29.0 27.2 L 20.8 14.4" />
  </g>

  <!-- 2. 중앙 상단 사슬코 피처 (외곽 테두리 선 + 내부 구멍 마스킹 레이어드) -->
  <ellipse cx="32.0" cy="14.4" rx="5.0" ry="3.0" fill="#ffffff" stroke="#000000" stroke-width="3.5" />

  <!-- 3. 기둥별 한길 긴뜨기 사선 빗금 세트 (중심 기준 데칼코마니 대칭) -->
  <g fill="none" stroke="#000000" stroke-width="3.15" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 30.0 23.5 L 24.4 26.0" />
    <path d="M 34.0 23.5 L 39.6 26.0" />
  </g>
</svg>
