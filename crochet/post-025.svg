    - KR_NAME_ABBR     : 한길교차_중간사슬_왼쪽
    - JA_NAME_FULL     : 長編みの交差編み_間に鎖編み_左
    - JA_NAME_ABBR     : 長編交差_間鎖_左
    - EN_NAME_US_FULL  : double_crochet_cross_stitch_with_chain_left
