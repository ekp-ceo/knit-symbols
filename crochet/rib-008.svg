      <rdf:Description>
        <dc:title>한길 긴뜨기 2코 넣는 이랑뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 2코 넣는 이랑뜨기 기호. 좌우 사선 빗금들을 기둥 안쪽으로 각각 1.5px 수평 이동하여 기둥과의 시각적 결합도를 극대화한 최종 정밀 교정 완본.</dc:description>
      </rdf:Description>
