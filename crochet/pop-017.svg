<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 두길_긴뜨기_4코_구슬뜨기_코_아래에서
    - KR_NAME_ABBR     : 두길4구슬_아래
    - JA_NAME_FULL     : 長々編み4目の玉編み_下
    - JA_NAME_ABBR     : 長々4目玉編み_下
    - EN_NAME_US_FULL  : triple_crochet_4_stitch_bobble_from_below
    - EN_NAME_US_ABBR  : tr_4_st_bobble_blw
    - EN_NAME_UK_FULL  : double_treble_crochet_4_stitch_bobble_from_below
    - EN_NAME_UK_ABBR  : dtr_4_st_bobble_blw
    - SYMBOL_SHAPE     : 4_branched_inverted_open_oval_shape_with_top_bar_and_double_slashes
    - SYMBOL_STYLE     : tr_4_bobble_open_base
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:4
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 4
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길 긴뜨기 4코 구슬뜨기 (코 아래에서)</dc:title>
        <dc:description>보그 코바늘 표준 두길 긴뜨기 4코 구슬뜨기 (코 아래에서) 기호. 구슬뜨기(pop) 카테고리의 열일곱 번째 도안. 최외곽 4번 기둥의 아래쪽 빗금을 1px 아래로 수정하여 전체적인 수평 균형선과 곡선 대칭을 최적화한 최종 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(1.26) translate(-32, -32) translate(0, 2)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 20 20 L 44 20"/>
    
    <!-- 1번 기둥 (왼쪽 외곽 곡선 및 더블 빗금) -->
    <g>
      <path d="M 32 20 C 12 28, 12 44, 20 52"/>
      <path d="M 14.0 32.1 L 18.6 34.4"/>
      <path d="M 13.0 39.1 L 17.6 41.4"/>
    </g>
    
    <!-- 2번 기둥 (왼쪽 내측 곡선 및 더블 빗금) -->
    <g>
      <path d="M 32 20 C 22 28, 22 44, 28 52"/>
      <path d="M 23.5 32.1 L 28.1 34.4"/>
      <path d="M 22.5 38.1 L 27.1 40.4"/>
    </g>
    
    <!-- 3번 기둥 (오른쪽 내측 곡선 및 더블 빗금) -->
    <g>
      <path d="M 32 20 C 42 28, 42 44, 36 52"/>
      <path d="M 35.9 32.1 L 40.5 34.4"/>
      <path d="M 36.9 38.1 L 41.5 40.4"/>
    </g>
    
    <!-- 4번 기둥 (오른쪽 외곽 곡선 및 더블 빗금 - 아랫빗금 1px 아래로 이동) -->
    <g>
      <path d="M 32 20 C 52 28, 52 44, 44 52"/>
      <path d="M 45.4 32.1 L 50.0 34.4"/>
      <!-- Y축 1px 아래로 이동하여 왼쪽 1번 기둥(39.1/41.4)과의 대칭 및 외곽 밸런스 유지 (37.1/39.4 -> 38.1/40.4) -->
      <path d="M 46.4 38.1 L 51.0 40.4"/>
    </g>
  </g>
</svg>
