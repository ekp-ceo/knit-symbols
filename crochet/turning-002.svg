<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 기둥코_2코
    - KR_NAME_ABBR     : 기둥2
    - JA_NAME_FULL     : 立ち上がりの鎖目2目
    - JA_NAME_ABBR     : 立ち2
    - EN_NAME_US_FULL  : turning_chain_2_stitches
    - EN_NAME_US_ABBR  : tch_2
    - EN_NAME_UK_FULL  : turning_chain_2_stitches
    - EN_NAME_UK_ABBR  : tch_2
    - SYMBOL_SHAPE     : chain_vertical
    - SYMBOL_STYLE     : 2_ovals
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : center
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:1
    - STITCH_HEIGHT    : 2
    - STITCH_COUNT     : 1
    - CATEGORY         : turning
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>기둥코 2코</dc:title>
        <dc:description>보그 코바늘 표준 기둥코 2코 기호. 원본 서체와 동일하게 날씬한 세로 타원형으로 구현된 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 가로 폭을 6으로 줄이고 세로를 12로 늘려 홀쭉하고 정갈한 타원 밸런스 구현 -->
  <g fill="none" stroke="#000000" stroke-width="4">
    <!-- 위쪽 사슬 (중심 cy=19, ry=12) -> 하단 끝점 31 -->
    <ellipse cx="32" cy="19" rx="6" ry="12"/>
    <!-- 아래쪽 사슬 (중심 cy=45, ry=12) -> 상단 끝점 33 (정갈하게 유격을 유지하며 배치) -->
    <ellipse cx="32" cy="45" rx="6" ry="12"/>
  </g>
</svg>
