<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 두길_긴뜨기_3코_구슬뜨기_한_코에서
    - KR_NAME_ABBR     : 두길3구슬
    - JA_NAME_FULL     : 長々編み3目の玉編み
    - JA_NAME_ABBR     : 長々3目玉編み
    - EN_NAME_US_FULL  : triple_crochet_3_stitch_bobble
    - EN_NAME_US_ABBR  : tr_3_st_bobble
    - EN_NAME_UK_FULL  : double_treble_crochet_3_stitch_bobble
    - EN_NAME_UK_ABBR  : dtr_3_st_bobble
    - SYMBOL_SHAPE     : 3_branched_oval_almond_shape_with_center_bar_top_bar_and_double_slashes
    - SYMBOL_STYLE     : tr_3_bobble_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:4
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 3
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길 긴뜨기 3코 구슬뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 두길 긴뜨기 3코 구슬뜨기 (한 코에서) 기호. 구슬뜨기(pop) 카테고리의 열네 번째 도안. 1번과 3번 기둥의 위쪽 빗금은 중앙축으로 2px, 아래쪽 빗금은 외곽축으로 1px 교차 수평 이동하여 곡선 정렬을 최적화한 마스터 최종 완성본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(1.26) translate(-32, -32) translate(0, 2)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 1번 기둥 (왼쪽 외곽 곡선 및 더블 빗금 조정) -->
    <g>
      <path d="M 32 20 C 13 28, 13 44, 32 52"/>
      <!-- 위쪽 빗금: 안쪽으로 2px 이동 (14.5/19.1 -> 16.5/21.1) -->
      <path d="M 16.5 32.1 L 21.1 34.4"/>
      <!-- 아래쪽 빗금: 바깥쪽으로 1px 이동 (16.5/21.1 -> 15.5/20.1) -->
      <path d="M 15.5 37.1 L 20.1 39.4"/>
    </g>
    
    <!-- 2번 기둥 (정중앙 수직 직선 다리 및 더블 빗금) -->
    <g>
      <path d="M 32 20 L 32 52"/>
      <path d="M 29.7 32.3 L 34.3 34.9"/>
      <path d="M 29.7 37.3 L 34.3 39.9"/>
    </g>
    
    <!-- 3번 기둥 (오른쪽 외곽 곡선 및 더블 빗금 조정) -->
    <g>
      <path d="M 32 20 C 51 28, 51 44, 32 52"/>
      <!-- 위쪽 빗금: 안쪽으로 2px 이동 (44.9/49.5 -> 42.9/47.5) -->
      <path d="M 42.9 32.1 L 47.5 34.4"/>
      <!-- 아래쪽 빗금: 바깥쪽으로 1px 이동 (42.9/47.5 -> 43.9/48.5) -->
      <path d="M 43.9 37.1 L 48.5 39.4"/>
    </g>
  </g>
</svg>
