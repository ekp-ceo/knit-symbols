<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 짧은뜨기_2코_넣는_이랑뜨기_한_코에서
    - KR_NAME_ABBR     : 짧은2코넣는이랑
    - JA_NAME_FULL     : 細編み2目編み入れる畝編み_すじ編み
    - JA_NAME_ABBR     : 細編2目入れる畝編み
    - EN_NAME_US_FULL  : single_crochet_2_stitch_increase_back_loop_only
    - EN_NAME_US_ABBR  : sc_2_st_inc_blo
    - EN_NAME_UK_FULL  : double_crochet_2_stitch_increase_back_loop_only
    - EN_NAME_UK_ABBR  : dc_2_st_inc_blo
    - SYMBOL_SHAPE     : v_shape_cross_mark_with_bottom_flat_rib_bar
    - SYMBOL_STYLE     : ribbed_increase_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_rib_bar
    - STITCH_RATIO     : 1:1
    - STITCH_HEIGHT    : 1
    - STITCH_COUNT     : 2
    - CATEGORY          : rib
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>짧은뜨기 2코 넣는 이랑뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 짧은뜨기 2코 넣는 이랑뜨기 기호. 데이터 노이즈 방지를 위해 모든 괄호를 언더바로 완벽히 정제하였으며, 하단 한 점에서 갈라지는 V자형 짧은뜨기 대각 기둥들과 그 밑을 받치는 평평한 수평 이랑 바를 결합한 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 짧은뜨기 2코 넣는 늘림뜨기 (V자형 구조) -->
    <!-- 왼쪽 짧은뜨기 다리 기둥 -->
    <path d="M 21 16 L 32 38" />
    <!-- 오른쪽 짧은뜨기 다리 기둥 -->
    <path d="M 43 16 L 32 38" />

    <!-- 2. 하단 이랑뜨기 가로 받침대 (Flat Rib Bar) -->
    <!-- 다리가 모이는 수렴점(Y=38) 바로 아래인 Y=48선에 평평하게 정렬 -->
    <path d="M 18 48 L 46 48" />
  </g>
</svg>
