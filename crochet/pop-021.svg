<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_2코_팝콘뜨기_한_코에서
    - KR_NAME_ABBR     : 긴2팝콘
    - JA_NAME_FULL     : 中長編み2目のポップコーン編み
    - JA_NAME_ABBR     : 中長2目ポップコーン
    - EN_NAME_US_FULL  : half_double_crochet_2_stitch_popcorn
    - EN_NAME_US_ABBR  : hdc_2_st_popcorn
    - EN_NAME_UK_FULL  : half_treble_crochet_2_stitch_popcorn
    - EN_NAME_UK_ABBR  : htr_2_st_popcorn
    - SYMBOL_SHAPE     : flat_oval_top_ring_with_2_outer_shell_paths_only
    - SYMBOL_STYLE     : hdc_2_popcorn_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : popcorn_top_ring
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 2
    - STITCH_COUNT     : 2
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 2코 팝콘뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 2코 팝콘뜨기 (한 코에서) 기호. 내부 기둥 없이 상단 타원 링에서 하단 한 점(32,54)으로 떨어지는 외곽 2가닥 선만으로 2코의 속성을 완벽하게 시각화한 마스터 가이드 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 가로형 타원 링 (머리 고리) -->
    <path d="M 32 16 C 40 16, 43 19, 42 22 C 40 25, 24 25, 22 22 C 21 19, 24 16, 32 16 Z" />

    <!-- 1번 가닥: 팝콘 외곽 왼쪽 라인 (타원 왼쪽 끝에서 하단 중심 32,54로) -->
    <path d="M 22 22 C 12 30, 12 48, 32 54" />

    <!-- 2번 가닥: 팝콘 외곽 오른쪽 라인 (타원 오른쪽 끝에서 하단 중심 32,54로) -->
    <path d="M 42 22 C 52 30, 52 48, 32 54" />
  </g>
</svg>
