<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 세길_긴뜨기_뒤걸어뜨기
    - KR_NAME_ABBR     : 세길뒤걸어
    - JA_NAME_FULL     : 長々々編みの裏引き上げ編み
    - JA_NAME_ABBR     : 長々々編表引き上げ
    - EN_NAME_US_FULL  : back_post_triple_crochet
    - EN_NAME_US_ABBR  : trtr_post_back
    - EN_NAME_UK_FULL  : back_post_quadruple_treble_crochet
    - EN_NAME_UK_ABBR  : qtr_post_back
    - SYMBOL_SHAPE     : top_bar_with_lifted_triple_slash_stem_and_centered_loop_back_post_hook
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : back_post_hook
    - STITCH_RATIO     : 1:5
    - STITCH_HEIGHT    : 5
    - STITCH_COUNT     : 1
    - CATEGORY          : post
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>세길 긴뜨기 뒤걸어뜨기</dc:title>
        <dc:description>보그 코바늘 표준 세길 긴뜨기 뒤걸어뜨기 실존 기호. 3개의 사선 빗금 간격을 유지한 채 전체 궤적을 0.5px 상향 이동시켜 하단 훅과의 간섭을 최소화하고 가독성을 극대화한 10번 마스터 최종본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 세길 긴뜨기 상단 수평 머리 바 -->
    <path d="M 22 10 L 42 10" />

    <!-- 2. 몸통 중심 사선 빗금 3개 (전체 0.5px 상향 이동 적용) -->
    <!-- 상단 빗금: Y값 -0.5 교정 (18.1/15.1 -> 17.6/14.6) -->
    <path d="M 28.5 17.6 L 34.5 14.6" />
    <!-- 중단 빗금: Y값 -0.5 교정 (23.5/20.5 -> 23.0/20.0) -->
    <path d="M 28.5 23.0 L 34.5 20.0" />
    <!-- 하단 빗금: Y값 -0.5 교정 (28.9/25.9 -> 28.4/25.4) -->
    <path d="M 28.5 28.4 L 34.5 25.4" />

    <!-- 3. 뒤걸어 궤적: 수직 기둥 및 반대로 감기는 가운데 정렬 원형 훅 -->
    <path d="M 32 10 L 32 30 C 32 32, 26 32, 24 35 C 21 40, 23 50, 32 50 C 41 50, 41 40, 41 40" />
  </g>
</svg>
