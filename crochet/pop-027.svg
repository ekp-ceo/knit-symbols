      <rdf:Description>
        <dc:title>한길 긴뜨기 4코 팝콘뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 4코 팝콘뜨기 (한 코에서) 기호. 동일한 상단 타원 링과 하단 수렴점 규격 안에서 사선 빗금이 각각 포함된 외곽 2가닥 선과 내측 2가닥 곡선 기둥이 완벽한 균형을 이루는 마스터 완본.</dc:description>
      </rdf:Description>
