<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 짧은뜨기_2코_모아뜨기
    - KR_NAME_ABBR     : 짧은2모아
    - JA_NAME_FULL     : 細編み2目一度
    - JA_NAME_ABBR     : 細2目一度
    - EN_NAME_US_FULL  : single_crochet_2_stitch_decrease
    - EN_NAME_US_ABBR  : sc_2_st_dec
    - EN_NAME_UK_FULL  : double_crochet_2_stitch_decrease
    - EN_NAME_UK_ABBR  : dc_2_st_dec
    - SYMBOL_SHAPE     : inverted_v_shape
    - SYMBOL_STYLE     : cross_contained
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:1
    - STITCH_HEIGHT    : 1
    - STITCH_COUNT     : 2
    - CATEGORY          : dec
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>짧은뜨기 2코 모아뜨기</dc:title>
        <dc:description>보그 코바늘 표준 짧은뜨기 2코 모아뜨기 기호. 모아뜨기(dec) 카테고리의 첫 번째 마스터 도안. 상단 꼭짓점(32, 20)에서 아래로 벌어지는 역V자 형태를 취하고, 다리 사이 각도를 5도 더 넓혀 하단 분배를 시원하게 만든 최종 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- [0.81 스케일 및 캔버스 센터 정렬 밸런스 유지] -->
  <g transform="translate(32, 32) scale(0.81) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 역V자 메인 줄기 (상단 꼭짓점에서 하단 양끝으로 시원하게 뻗는 구조) -->
    <path d="M 10 50 L 32 20 L 54 50"/>
    
    <!-- 내부 하단 짧은뜨기(X) 기호 (역V자 내부 정중앙 안착) -->
    <path d="M 27 35 L 37 45"/>
    <path d="M 37 35 L 27 45"/>
  </g>
</svg>
