<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 세길_긴뜨기_2코_넣는_이랑뜨기_한_코에서
    - KR_NAME_ABBR     : 세길2코넣는이랑
    - JA_NAME_FULL     : 長々々編み2目編み入れる畝編み_すじ編み
    - JA_NAME_ABBR     : 長々々2目入れる畝編み
    - EN_NAME_US_FULL  : double_treble_crochet_2_stitch_increase_back_loop_only
    - EN_NAME_US_ABBR  : dtr_2_st_inc_blo
    - EN_NAME_UK_FULL  : triple_treble_crochet_2_stitch_increase_back_loop_only
    - EN_NAME_UK_ABBR  : trtr_2_st_inc_blo
    - SYMBOL_SHAPE     : v_shape_separated_t_marks_with_staggered_triple_slashes_and_bottom_flat_rib_bar
    - SYMBOL_STYLE     : ribbed_increase_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_rib_bar
    - STITCH_RATIO     : 1:5
    - STITCH_HEIGHT    : 5
    - STITCH_COUNT     : 2
    - CATEGORY          : rib
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>세길 긴뜨기 2코 넣는 이랑뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 세길 긴뜨기 2코 넣는 이랑뜨기 기호. AI가 총 6개의 빗금 획을 명확하게 분리 인지할 수 있도록 상단(바깥), 중단(센터), 하단(안쪽)으로 지그재그 교차 정렬하고, 하단 수평 이랑 바와 결합한 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 세길 긴뜨기 2코 넣는 늘림뜨기 -->
    <!-- 왼쪽 세길 긴뜨기 요소 -->
    <path d="M 13 14 L 29 14" />
    <path d="M 21 14 L 32 38" />
    <!-- 빗금 1 (상단): 바깥쪽(왼쪽) 배치 -->
    <path d="M 21.0 18.5 L 27.0 21.5" />
    <!-- 빗금 2 (중단): 기둥 센터 배치 -->
    <path d="M 23.0 25.0 L 29.0 28.0" />
    <!-- 빗금 3 (하단): 안쪽(오른쪽) 배치 -->
    <path d="M 25.0 31.5 L 31.0 34.5" />

    <!-- 오른쪽 세길 긴뜨기 요소 -->
    <path d="M 35 14 L 51 14" />
    <path d="M 43 14 L 32 38" />
    <!-- 빗금 1 (상단): 바깥쪽(오른쪽) 배치 -->
    <path d="M 37.5 21.5 L 42.5 18.5" />
    <!-- 빗금 2 (중단): 기둥 센터 배치 -->
    <path d="M 35.5 28.0 L 40.5 25.0" />
    <!-- 빗금 3 (하단): 안쪽(왼쪽) 배치 -->
    <path d="M 33.5 34.5 L 38.5 31.5" />

    <!-- 2. 하단 이랑뜨기 가로 받침대 (Flat Rib Bar) -->
    <path d="M 18 48 L 46 48" />
  </g>
</svg>
