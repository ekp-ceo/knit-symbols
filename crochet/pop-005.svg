<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_5코_구슬뜨기_한_코에서
    - KR_NAME_ABBR     : 긴뜨기5구슬
    - JA_NAME_FULL     : 中長編み5目の玉編み
    - JA_NAME_ABBR     : 中長5目玉編み
    - EN_NAME_US_FULL  : half_double_crochet_5_stitch_bobble
    - EN_NAME_US_ABBR  : hdc_5_st_bobble
    - EN_NAME_UK_FULL  : half_treble_crochet_5_stitch_bobble
    - EN_NAME_UK_ABBR  : htr_5_st_bobble
    - SYMBOL_SHAPE     : 5_branched_oval_almond_shape_with_center_bar_and_top_bar
    - SYMBOL_STYLE     : hdc_5_bobble_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:2.5
    - STITCH_HEIGHT    : 2.5
    - STITCH_COUNT     : 5
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 5코 구슬뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 5코 구슬뜨기 (한 코에서) 기호. 구슬뜨기(pop) 카테고리의 다섯 번째 도안. 20% 확장된 scale(0.97) 프레임 내부에 4가닥의 대칭 곡선과 1가닥의 정중앙 수직 직선을 결합하여 조밀하고 풍성한 5가닥 균형을 구현한 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(0.97) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 1번 기둥 (왼쪽 외곽 곡선) -->
    <path d="M 32 20 C 17.6 28, 17.6 44, 32 52"/>
    
    <!-- 2번 기둥 (왼쪽 내측 곡선) -->
    <path d="M 32 20 C 24.8 28, 24.8 44, 32 52"/>
    
    <!-- 3번 기둥 (정중앙 수직 직선 다리 - 5코 구슬뜨기 핵심 축) -->
    <path d="M 32 20 L 32 52"/>
    
    <!-- 4번 기둥 (오른쪽 내측 곡선) -->
    <path d="M 32 20 C 39.2 28, 39.2 44, 32 52"/>
    
    <!-- 5번 기둥 (오른쪽 외곽 곡선) -->
    <path d="M 32 20 C 46.4 28, 46.4 44, 32 52"/>
  </g>
</svg>
