<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 기둥코_4코
    - KR_NAME_ABBR     : 기둥4
    - JA_NAME_FULL     : 立ち上がりの鎖目4目
    - JA_NAME_ABBR     : 立ち4
    - EN_NAME_US_FULL  : turning_chain_4_stitches
    - EN_NAME_US_ABBR  : tch_4
    - EN_NAME_UK_FULL  : turning_chain_4_stitches
    - EN_NAME_UK_ABBR  : tch_4
    - SYMBOL_SHAPE     : chain_vertical
    - SYMBOL_STYLE     : 4_ovals
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : center
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:1
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 1
    - CATEGORY         : turning
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>기둥코 4코</dc:title>
        <dc:description>보그 코바늘 표준 기둥코 4코 기호. 타원의 내부를 침범하지 않고 4개의 날씬한 사슬 끝점이 정밀하게 맞닿는 구조.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 개별 타원의 세로 높이(ry)를 6.5로 맞추어, 서로 겹치지 않고 정확히 한 점씩만 접하도록 정밀 배치 -->
  <g fill="none" stroke="#000000" stroke-width="4">
    <!-- 첫 번째 사슬 (맨 위: 중심 cy=10, ry=6.5) -> 하단 끝점 16.5 -->
    <ellipse cx="32" cy="10" rx="4.5" ry="6.5"/>
    <!-- 두 번째 사슬 (중심 cy=23, ry=6.5) -> 상단 끝점 16.5 / 하단 끝점 29.5 -->
    <ellipse cx="32" cy="23" rx="4.5" ry="6.5"/>
    <!-- 세 번째 사슬 (중심 cy=36, ry=6.5) -> 상단 끝점 29.5 / 하단 끝점 42.5 -->
    <ellipse cx="32" cy="36" rx="4.5" ry="6.5"/>
    <!-- 네 번째 사슬 (맨 아래: 중심 cy=49, ry=6.5) -> 상단 끝점 42.5 -->
    <ellipse cx="32" cy="49" rx="4.5" ry="6.5"/>
  </g>
</svg>
