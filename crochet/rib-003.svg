<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_이랑뜨기
    - KR_NAME_ABBR     : 한길이랑
    - JA_NAME_FULL     : 長編みの畝編み (すじ編み)
    - JA_NAME_ABBR     : 長編畝編み
    - EN_NAME_US_FULL  : double_crochet_back_loop_only
    - EN_NAME_US_ABBR  : dc_blo
    - EN_NAME_UK_FULL  : treble_crochet_back_loop_only
    - EN_NAME_UK_ABBR  : tr_blo
    - SYMBOL_SHAPE     : t_shape_mark_with_single_slash_and_bottom_flat_rib_bar
    - SYMBOL_STYLE     : ribbed_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_rib_bar
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 1
    - CATEGORY          : rib
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 이랑뜨기</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 이랑뜨기 기호. 중앙 수직 기둥에 1개의 사선 빗금이 포함된 한길 긴뜨기(T) 심볼과 그 하단을 평평하게 받치는 정통 보그 스타일의 이랑뜨기 가로 바(Bar)를 조화롭게 결합한 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 한길 긴뜨기 (T 심볼 + 사선 빗금 1개) -->
    <!-- 한길 긴뜨기 상단 가로 바 -->
    <path d="M 20 14 L 44 14" />
    <!-- 한길 긴뜨기 수직 중심 기둥 (중심축 X=32, Y=14 ~ Y=38) -->
    <path d="M 32 14 L 32 38" />
    <!-- 기둥 중심부에 얹히는 한길 긴뜨기 사선 빗금 (1개) -->
    <path d="M 28 23.5 L 36 28.5" />

    <!-- 2. 하단 이랑뜨기 가로 받침대 (Flat Rib Bar) -->
    <!-- 수직 기둥 끝단(Y=38) 아래 Y=48선에 정갈하게 배치 -->
    <path d="M 18 48 L 46 48" />
  </g>
</svg>
