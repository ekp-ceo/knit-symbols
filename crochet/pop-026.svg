<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_3코_팝콘뜨기_한_코에서
    - KR_NAME_ABBR     : 한길3팝콘
    - JA_NAME_FULL     : 長編み3目のポップコーン編み
    - JA_NAME_ABBR     : 長編3目ポップコーン
    - EN_NAME_US_FULL  : double_crochet_3_stitch_popcorn
    - EN_NAME_US_ABBR  : dc_3_st_popcorn
    - EN_NAME_UK_FULL  : treble_crochet_3_stitch_popcorn
