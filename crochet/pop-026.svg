    - SYMBOL_SHAPE     : flat_oval_top_ring_with_outer_shell_enclosing_1_center_vertical_bar_with_single_slashes
    - SYMBOL_STYLE     : dc_3_popcorn_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : popcorn_top_ring
    - STITCH_RATIO     : 1:3
