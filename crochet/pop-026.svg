    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 3코 팝콘뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 3코 팝콘뜨기 (한 코에서) 기호. 상단 타원 링 규격과 외곽 빗금 위치를 완벽하게 고정한 채, 사선 빗금이 포함된 정중앙 수직 기둥을 결합하여 총 3코를 구현한 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 가로형 타원 링 (머리 고리) -->
    <path d="M 32 10 C 40 10, 43 13, 42 16 C 40 19, 24 19, 22 16 C 21 13, 24 10, 32 10 Z" />

    <!-- 1번 가닥: 팝콘 외곽 왼쪽 라인 + 빗금 1개 -->
    <g>
      <path d="M 22 16 C 10 26, 10 48, 32 56" />
      <path d="M 11.5 33.0 L 16.1 35.5" />
    </g>

    <!-- 2번 가닥: 정중앙 수직 기둥 + 빗금 1개 (타원 침범 방지) -->
    <g>
      <path d="M 32 21 L 32 56" />
      <path d="M 29.7 34.2 L 34.3 36.8" />
    </g>

    <!-- 3번 가닥: 팝콘 외곽 오른쪽 라인 + 빗금 1개 -->
    <g>
      <path d="M 42 16 C 54 26, 54 48, 32 56" />
      <path d="M 47.9 33.0 L 52.5 35.5" />
    </g>
  </g>
