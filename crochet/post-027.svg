<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - FILE_NAME        : post-027.svg
    - KR_NAME_FULL     : 두길_긴뜨기_교차뜨기_중간_사슬코_왼쪽
    - KR_NAME_ABBR     : 두길교차_중간사슬_왼쪽
    - JA_NAME_FULL     : 長々編みの交差編み_間に鎖編み_左
    - JA_NAME_ABBR     : 長々編交差_間鎖_左
    - EN_NAME_US_FULL  : triple_crochet_cross_stitch_with_chain_left
    - EN_NAME_US_ABBR  : tr_cross_ch_l
    - SYMBOL_SHAPE     : x_cross_with_top_chain_and_gap
    - SYMBOL_STYLE     : vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : cross_overlapped_left_up_with_chain
    - STITCH_RATIO     : 2:2
    - STITCH_HEIGHT    : 4
    - STITCH_COUNT     : 2
    - CATEGORY          : cross_combination
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길 긴뜨기 교차뜨기 (중간 사슬코) - 왼쪽</dc:title>
        <dc:description>보그 코바늘 표준 두길 긴뜨기 교차뜨기 (중간 사슬코) 기호 (왼쪽). 오른쪽에서 올라가는 기둥이 전면에 오고, 상단 머리 사이 사슬 구멍 개방 피처와 기둥당 2줄의 데칼코마니 대칭 빗금을 안착시킨 27번 마스터 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 1. 메인 기둥 및 머리 뼈대 그룹 (기본 두께 4.5px) -->
  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 독립된 머리 바 2개 (80% 스케일) -->
    <path d="M 16.0 14.4 L 25.6 14.4" />
    <path d="M 38.4 14.4 L 48.0 14.4" />

    <!-- X자형 교차 몸통 -->
    <!-- [전면] 오른쪽에서 올라가는 우상향 기둥 -->
    <path d="M 20.8 49.6 L 43.2 14.4" />
    
    <!-- [후면] 왼쪽에서 올라가는 좌상향 기둥 (중앙 마스킹 갭 적용) -->
    <path d="M 43.2 49.6 L 35.0 36.8" />
    <path d="M 29.0 27.2 L 20.8 14.4" />
  </g>

  <!-- 2. 중앙 상단 사슬코 피처 (내부 화이트 마스킹으로 구멍 개방) -->
  <ellipse cx="32.0" cy="14.4" rx="5.0" ry="3.0" fill="#ffffff" stroke="#000000" stroke-width="3.5" />

  <!-- 3. 기둥별 두길 긴뜨기 사선 빗금 세트 (두께 3.15px, 중심 기준 데칼코마니 완벽 대칭) -->
  <g fill="none" stroke="#000000" stroke-width="3.15" stroke-linecap="round" stroke-linejoin="round">
    <!-- [오른쪽 기둥 부하] 오리지널 좌상향 빗금 2줄 (외곽 이동 스펙 유지) -->
    <path d="M 30.0 23.5 L 24.4 26.0" />
    <path d="M 27.0 20.0 L 21.4 22.5" />

    <!-- [왼쪽 기둥 부하] 데칼코마니 거울 반전 우상향 빗금 2줄 -->
    <path d="M 34.0 23.5 L 39.6 26.0" />
    <path d="M 37.0 20.0 L 42.6 22.5" />
  </g>
</svg>
