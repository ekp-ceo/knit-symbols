<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 기둥코_3코
    - KR_NAME_ABBR     : 기둥3
    - JA_NAME_FULL     : 立ち上がりの鎖目3目
    - JA_NAME_ABBR     : 立ち3
    - EN_NAME_US_FULL  : turning_chain_3_stitches
    - EN_NAME_US_ABBR  : tch_3
    - EN_NAME_UK_FULL  : turning_chain_3_stitches
    - EN_NAME_UK_ABBR  : tch_3
    - SYMBOL_SHAPE     : chain_vertical
    - SYMBOL_STYLE     : 3_ovals
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : center
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:1
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 1
    - CATEGORY         : turning
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>기둥코 3코</dc:title>
        <dc:description>보그 코바늘 표준 기둥코 3코 기호. 타원의 내부 영역을 침범하지 않고 끝점이 정확히 맞닿는 구조.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 개별 타원의 선이 서로의 영역을 넘어가지 않고 딱 끝점에서 만나도록 완벽 정렬 -->
  <g fill="none" stroke="#000000" stroke-width="4">
    <!-- 맨 위 사슬 (중심 cy=14, ry=9) -> 하단 끝점은 정확히 23 -->
    <ellipse cx="32" cy="14" rx="5.5" ry="9"/>
    <!-- 가운데 사슬 (중심 cy=32, ry=9) -> 상단 끝점 23 / 하단 끝점 41 -->
    <ellipse cx="32" cy="32" rx="5.5" ry="9"/>
    <!-- 맨 아래 사슬 (중심 cy=50, ry=9) -> 상단 끝점은 정확히 41 -->
    <ellipse cx="32" cy="50" rx="5.5" ry="9"/>
  </g>
</svg>
