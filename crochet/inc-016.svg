<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길긴뜨기_4코_늘려뜨기_한_코에서
    - KR_NAME_ABBR     : 한길4늘려_코
    - JA_NAME_FULL     : 長編み4目編み入れる_目に
    - JA_NAME_ABBR     : 長4増し_目
    - EN_NAME_US_FULL  : double_crochet_4_stitch_increase_into_stitch
    - EN_NAME_US_ABBR  : dc_4_st_inc
    - EN_NAME_UK_FULL  : treble_crochet_4_stitch_increase_into_stitch
