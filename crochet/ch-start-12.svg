<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA] - 두길긴뜨기 3코 늘려뜨기 시작코 두 번째 버전 - 사슬3 (빗금 미세 조정 완본)
    - FILE_NAME        : ch-start-12.svg
    - KR_NAME_FULL     : 두길긴뜨기_3코_늘려뜨기_시작코_사슬3
    - KR_NAME_ABBR     : 두길긴뜨기3코늘려_시작코_3ch
    - JA_NAME_FULL     : 長々編みの3目編み入れる_立ち上がり3目
    - JA_NAME_ABBR     : 長々3目入れる_立ち上がり3
    - EN_NAME_US_FULL  : treble_crochet_3_stitch_increase_with_3_chain_start
    - EN_NAME_US_ABBR  : tr_3inc_3ch_start
    - SYMBOL_SHAPE     : w_fork_with_flat_bottom_double_slashed_and_3_compact_chains
    - SYMBOL_STYLE     : vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_root_3_branch_asymmetric_double_slashed_3_compressed_slim_chain
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 5
    - STITCH_COUNT     : 3
    - CATEGORY          : chain_start_column
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길긴뜨기 3코 늘려뜨기_시작코 (사슬3)</dc:title>
        <dc:description>보그 코바늘 표준 [사슬 포함 시작코(ch-start)] 카테고리의 12번 마스터 기호. 1번 기둥 하단 빗금을 위로 1px 올리고, 중앙 기둥 빗금 2줄을 일괄 위로 1px 상향 조율하여 최종 미세 눈높이를 완벽하게 결속한 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 1. 두길긴뜨기 기둥 그룹 (기본 두께 4.5px, 바닥 공통점 32.0, 49.6에서 분기 및 빗금 최종 튜닝 완료) -->
  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- [좌측 두길긴뜨기] 머리 바, 경사 기둥 및 빗금 (하단 빗금 고도 보정 완료) -->
    <path d="M 10.0 16.0 L 20.0 16.0" />
    <path d="M 32.0 49.6 L 15.0 16.0" />
    <path d="M 17.0 26.0 L 22.0 22.0" /> <!-- 상단 빗금 -->
    <path d="M 20.5 33.5 L 25.5 29.5" /> <!-- ★수정 피처: 1번 기둥 하단 빗금 위로 1px 이동 -->

    <!-- [중앙 수직 두길긴뜨기] 머리 바, 수직 기둥 및 빗금 (전체 1px 상향 완료) -->
    <path d="M 27.0 16.0 L 37.0 16.0" />
    <path d="M 32.0 49.6 L 32.0 16.0" />
    <path d="M 29.5 26.0 L 34.5 24.0" /> <!-- ★수정 피처: 수직 기둥 상단 빗금 위로 1px 이동 -->
    <path d="M 29.5 33.0 L 34.5 31.0" /> <!-- ★수정 피처: 수직 기둥 하단 빗금 위로 1px 이동 -->
  </g>

  <!-- 2. 우측 시작 사슬코 기둥 세트 (35도 경사 유지 + 11번의 압축 3단 사슬 마스터 좌표 계승) -->
  <!-- 사슬 외곽선 3.5px, 내부 fill="#ffffff"로 구멍 개방 효과 극대화 -->
  <g stroke="#000000" stroke-width="3.5" fill="#ffffff" stroke-linejoin="round">
    <!-- [1층] 하단 사슬코 -->
    <ellipse cx="36.0" cy="43.5" rx="3.0" ry="6.5" transform="rotate(35 36.0 43.5)" />
    
    <!-- [2층] 중간 사슬코 -->
    <ellipse cx="42.0" cy="32.0" rx="3.0" ry="6.5" transform="rotate(35 42.0 32.0)" />

    <!-- [3층] 상단 사슬코 (최종 머리 높이가 두길긴뜨기 정점 라인인 Y=16.0에 안착) -->
    <ellipse cx="48.0" cy="20.5" rx="3.0" ry="6.5" transform="rotate(35 48.0 20.5)" />
  </g>
</svg>
