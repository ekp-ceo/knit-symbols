<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_뒤걸어_2코_늘려뜨기
    - KR_NAME_ABBR     : 한길뒤걸어2코늘려
    - JA_NAME_FULL     : 長編みの裏引き上げ2目編み入れる
    - JA_NAME_ABBR     : 長編裏引2目編入
    - EN_NAME_US_FULL  : 2_dc_increase_back_post
    - EN_NAME_US_ABBR  : fpdc_inc
    - EN_NAME_UK_FULL  : 2_tr_increase_back_post
    - EN_NAME_UK_ABBR  : fptr_inc
    - SYMBOL_SHAPE     : v_stem_with_inward_slashes_and_single_centered_back_post_hook
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : back_post_hook_single_root
    - STITCH_RATIO     : 2:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 2
    - CATEGORY          : post_combination
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 뒤걸어 2코 늘려뜨기</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 뒤걸어 2코 늘려뜨기 실존 기호. V자형으로 벌어지는 사선 기둥에 맞추어 좌우 빗금을 안쪽으로 각각 1px씩 이동해 기하학적 결합도를 높이고 하단 뒤걸어 훅을 정중앙 정렬한 12번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 상단 분리된 2개의 수평 머리 바 -->
    <path d="M 14 10 L 28 10" />
    <path d="M 36 10 L 50 10" />

    <!-- 2. V자형 사선 기둥 몸통 -->
    <path d="M 21 10 L 32 30" />
    <path d="M 43 10 L 32 30" />

    <!-- 3. 각 기둥 몸통 중심 사선 빗금 (안쪽으로 1px 이동 적용) -->
    <!-- 왼쪽 빗금: X축 +1 이동 (22.2/27.8 -> 23.2/28.8) -->
    <path d="M 23.2 21.0 L 28.8 18.5" />
    <!-- 오른쪽 빗금: X축 -1 이동 (36.2/41.8 -> 35.2/40.8) -->
    <path d="M 35.2 18.5 L 40.8 21.0" />

    <!-- 4. 하단 단일 뿌리: 가운데 정렬 원형 뒤걸어 훅 (왼쪽 반전) -->
    <path d="M 32 30 L 32 32 C 32 34, 26 34, 24 37 C 21 42, 23 52, 32 52 C 41 52, 41 42, 41 42" />
  </g>
</svg>
