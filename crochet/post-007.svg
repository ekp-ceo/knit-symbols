<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_뒤걸어뜨기
    - KR_NAME_ABBR     : 긴뒤걸어
    - JA_NAME_FULL     : 中長編みの裏引き上げ編み
    - JA_NAME_ABBR     : 中長編裏引き上げ
    - EN_NAME_US_FULL  : back_post_half_double_crochet
    - EN_NAME_US_ABBR  : hdc_post_back
    - EN_NAME_UK_FULL  : back_post_half_treble_crochet
    - EN_NAME_UK_ABBR  : htr_post_back
    - SYMBOL_SHAPE     : t_bar_with_centered_loop_back_post_hook
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : back_post_hook
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 2
    - STITCH_COUNT     : 1
    - CATEGORY          : post
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 뒤걸어뜨기</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 뒤걸어뜨기 실존 기호. 상단에 긴뜨기의 고유 특징인 'T'자형 수평 바를 밀착 결합하고, 하단 원형 훅의 회전 방향을 왼쪽으로 반전시켜 기둥 중심축(X=32)과 완벽한 대칭을 맞춘 7번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 긴뜨기 상단 수평 T-Bar -->
    <path d="M 22 10 L 42 10" />

    <!-- 2. 뒤걸어 궤적: 수직 기둥 및 반대로 감기는 가운데 정렬 원형 훅 -->
    <!-- X=32 라인에서 수직 진행 후, 왼쪽(X=26)으로 부드럽게 감아 돌며 전체 하단 원형이 정중앙 정렬을 이루도록 배치 -->
    <path d="M 32 10 L 32 30 C 32 32, 26 32, 24 35 C 21 40, 23 50, 32 50 C 41 50, 41 40, 41 40" />
  </g>
</svg>
