<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_4코_모아뜨기
    - KR_NAME_ABBR     : 긴4모아
    - JA_NAME_FULL     : 中長編み4目一度
    - JA_NAME_ABBR     : 中長4目一度
    - EN_NAME_US_FULL  : half_double_crochet_4_stitch_decrease
    - EN_NAME_US_ABBR  : hdc_4_st_dec
    - EN_NAME_UK_FULL  : half_treble_crochet_4_stitch_decrease
    - EN_NAME_UK_ABBR  : htr_4_st_dec
    - SYMBOL_SHAPE     : 4_branched_inverted_fan_with_top_bar
    - SYMBOL_STYLE     : hdc_4_together_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 2
    - STITCH_COUNT     : 4
    - CATEGORY          : dec
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 4코 모아뜨기</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 4코 모아뜨기 기호. 모아뜨기(dec) 카테고리의 다섯 번째 도안. 상단 꼭짓점(32, 20)의 수평 바 아래로 완벽한 대칭 각도를 가진 4개의 기둥 줄기가 수려하게 뻗어 내리는 형태.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- [0.81 스케일 및 캔버스 센터 정렬 밸런스 완벽 유지] -->
  <g transform="translate(32, 32) scale(0.81) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 상단 긴뜨기 머리 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 모든 기둥은 상단 꼭짓점(32, 20)에서 출발하여 회전/분산 연산 배치 -->
    <!-- 1번 다리 (좌측 외곽) -->
    <g transform="rotate(-32, 32, 20)">
      <path d="M 32 20 L 32 52"/>
    </g>
    <!-- 2번 다리 (좌측 내측) -->
    <g transform="rotate(-11, 32, 20)">
      <path d="M 32 20 L 32 52"/>
    </g>
    <!-- 3번 다리 (우측 내측) -->
    <g transform="rotate(11, 32, 20)">
      <path d="M 32 20 L 32 52"/>
    </g>
    <!-- 4번 다리 (우측 외곽) -->
    <g transform="rotate(32, 32, 20)">
      <path d="M 32 20 L 32 52"/>
    </g>
    
  </g>
</svg>
