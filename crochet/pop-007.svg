<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길_긴뜨기_2코_구슬뜨기_코_아래에서
    - KR_NAME_ABBR     : 한길2구슬_아래
    - JA_NAME_FULL     : 長編み2目の玉編み_下
    - JA_NAME_ABBR     : 長2目玉編み_下
    - EN_NAME_US_FULL  : double_crochet_2_stitch_bobble_from_below
    - EN_NAME_US_ABBR  : dc_2_st_bobble_blw
    - EN_NAME_UK_FULL  : treble_crochet_2_stitch_bobble_from_below
    - EN_NAME_UK_ABBR  : tr_2_st_bobble_blw
    - SYMBOL_SHAPE     : inverted_open_oval_shape_with_top_bar_and_slashes
    - SYMBOL_STYLE     : dc_2_bobble_open_base
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 2
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길 긴뜨기 2코 구슬뜨기 (코 아래에서)</dc:title>
        <dc:description>보그 코바늘 표준 한길 긴뜨기 2코 구슬뜨기 (코 아래에서) 기호. 구슬뜨기(pop) 카테고리의 일곱 번째 도안. 하단 개방형 프레임 구조에 맞춰 좌우 외곽으로 시원하게 정렬된 단선 빗금을 적용하고 메타데이터 형식을 통일한 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(0.97) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 
      [하단 개방형 2코 구조 및 바깥쪽 빗금 정렬]
      - 상단 중앙(32, 20)에서 만나고 하단은 X=24, X=40으로 벌어지는 구조
      - 시인성을 위해 빗물 위치를 능선 바깥쪽 라인으로 조정
    -->
    
    <!-- 왼쪽 곡선 다리 및 빗금 (하단 개방) -->
    <g>
      <path d="M 32 20 C 20 28, 20 44, 24 52"/>
      <!-- 왼쪽 바깥쪽 빗금 -->
      <path d="M 18.5 34.5 L 24.5 37.5"/>
    </g>
    
    <!-- 오른쪽 곡선 다리 및 빗금 (하단 개방) -->
    <g>
      <path d="M 32 20 C 44 28, 44 44, 40 52"/>
      <!-- 오른쪽 바깥쪽 빗금 -->
      <path d="M 39.5 34.5 L 45.5 37.5"/>
    </g>
  </g>
</svg>
