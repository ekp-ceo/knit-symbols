<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 한길긴뜨기_3코_늘려뜨기_코_아래에서
    - KR_NAME_ABBR     : 한길3늘려_아래
    - JA_NAME_FULL     : 長編み3目編み入れる_束に
    - JA_NAME_ABBR     : 長2増し_束
    - EN_NAME_US_FULL  : double_crochet_3_stitch_increase_under_stitch
    - EN_NAME_US_ABBR  : dc_3_st_inc_under
    - EN_NAME_UK_FULL  : treble_crochet_3_stitch_increase_under_stitch
    - EN_NAME_UK_ABBR  : tr_3_st_inc_under
    - SYMBOL_SHAPE     : 3_isolated_slant_bars_with_slashes
    - SYMBOL_STYLE     : dc_3_branched_space_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:3
    - STITCH_HEIGHT    : 3
    - STITCH_COUNT     : 3
    - CATEGORY          : inc
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>한길긴뜨기 3코 늘려뜨기(코 아래에서)</dc:title>
        <dc:description>보그 코바늘 표준 기호. 하단 가로선이나 연결 곡선 없이, 3개의 기둥이 아래단까지 각각 독립적으로 떨어져서 끝나는 형태. 사선 빗금은 중간에서 조금 위 지점에 위치.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- [하단 독립 분리] 가로선이나 곡선 없이 각각 따로 떨어져 내리는 3개의 기둥선 -->
    <path d="M 16 16 L 24 54"/>
    <path d="M 32 16 L 32 54"/>
    <path d="M 48 16 L 40 54"/>
    
    <!-- 상단 수평 바 (-) -->
    <path d="M 12 16 L 20 16"/>
    <path d="M 28 16 L 36 16"/>
    <path d="M 44 16 L 52 16"/>
    
    <!-- [빗금 위치] '중간에서 조금 위' 지점 (Y:27~31) -->
    <!-- 왼쪽 기둥 사선 빗금 -->
    <path d="M 14 27 L 21 31"/>
    
    <!-- 중앙 기둥 사선 빗금 -->
    <path d="M 28 27 L 35 31"/>
    
    <!-- 오른쪽 기둥 사선 빗금 -->
    <path d="M 43 27 L 50 31"/>
  </g>
</svg>
