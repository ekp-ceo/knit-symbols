<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 긴뜨기_2코_구슬뜨기_한_코에서
    - KR_NAME_ABBR     : 긴뜨기2구슬
    - JA_NAME_FULL     : 中長編み2目の玉編み
    - JA_NAME_ABBR     : 中長2目玉編み
    - EN_NAME_US_FULL  : half_double_crochet_2_stitch_bobble
    - EN_NAME_US_ABBR  : hdc_2_st_bobble
    - EN_NAME_UK_FULL  : half_treble_crochet_2_stitch_bobble
    - EN_NAME_UK_ABBR  : htr_2_st_bobble
    - SYMBOL_SHAPE     : oval_almond_shape_with_top_bar
    - SYMBOL_STYLE     : hdc_2_bobble_isolated
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : none
    - STITCH_RATIO     : 1:2.5
    - STITCH_HEIGHT    : 2.5
    - STITCH_COUNT     : 2
    - CATEGORY          : pop
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>긴뜨기 2코 구슬뜨기 (한 코에서)</dc:title>
        <dc:description>보그 코바늘 표준 긴뜨기 2코 구슬뜨기 기호. 구슬뜨기(pop) 카테고리의 첫 번째 도안. 상단 바(32, 20)와 하단 꼭짓점(32, 52)을 공유하는 좌우 대칭 타원형 2가닥 곡선 밸런스를 적용한 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g transform="translate(32, 32) scale(0.81) translate(-32, -32) translate(0, 4)" fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상단 수평 바 -->
    <path d="M 22 20 L 42 20"/>
    
    <!-- 
      [구슬뜨기 몸통 - 좌우 대칭 곡선 설계]
      - 시작점: 상단 중앙 (32, 20)
      - 도착점: 하단 중앙 (32, 52)
      - 컨트롤 포인트를 좌우 20, 44 지점으로 균등 분산하여 깨끗한 아몬드 형태 유지
    -->
    <!-- 왼쪽 곡선 다리 -->
    <path d="M 32 20 C 20 28, 20 44, 32 52"/>
    
    <!-- 오른쪽 곡선 다리 -->
    <path d="M 32 20 C 44 28, 44 44, 32 52"/>
  </g>
</svg>
