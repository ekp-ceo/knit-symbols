<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA] - 두길긴뜨기 3코 늘려뜨기 시작코 첫 번째 버전 - 사슬2 (빗금 전체 위로 1px)
    - FILE_NAME        : ch-start-10.svg
    - KR_NAME_FULL     : 두길긴뜨기_3코_늘려뜨기_시작코_사슬2
    - KR_NAME_ABBR     : 두길긴뜨기3코늘려_시작코_2ch
    - JA_NAME_FULL     : 長々編みの3目編み入れる_立ち上がり
    - JA_NAME_ABBR     : 長々2目入れる_立ち上がり
    - EN_NAME_US_FULL  : treble_crochet_3_stitch_increase_with_2_chain_start
    - EN_NAME_US_ABBR  : tr_3inc_2ch_start
    - SYMBOL_SHAPE     : w_fork_with_flat_bottom_double_slashed_and_2_aligned_chains
    - SYMBOL_STYLE     : vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : flat_root_3_branch_asymmetric_double_slashed_slim_chain
    - STITCH_RATIO     : 1:2
    - STITCH_HEIGHT    : 5
    - STITCH_COUNT     : 3
    - CATEGORY          : chain_start_column
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>두길긴뜨기 3코 늘려뜨기_시작코 (사슬2)</dc:title>
        <dc:description>보그 코바늘 표준 [사슬 포함 시작코(ch-start)] 카테고리의 10번 마스터 기호. 모든 기둥의 사선 빗금 피처들을 일괄적으로 위로 1px씩 이동시켜 고도감을 상향 매칭한 최종 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <!-- 1. 두길긴뜨기 기둥 그룹 (기본 두께 4.5px, 바닥 공통점 32.0, 49.6에서 분기 및 빗금 전체 고도 보정 완료) -->
  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- [좌측 두길긴뜨기] 머리 바, 경사 기둥 및 빗금 (위로 1px씩 이동 완료) -->
    <path d="M 10.0 16.0 L 20.0 16.0" />
    <path d="M 32.0 49.6 L 15.0 16.0" />
    <path d="M 17.0 26.0 L 22.0 22.0" /> <!-- 상단 빗금 -->
    <path d="M 21.0 34.5 L 26.0 30.5" /> <!-- 하단 빗금 -->

    <!-- [중앙 수직 두길긴뜨기] 머리 바, 수직 기둥 및 빗금 (위로 1px씩 이동 완료) -->
    <path d="M 27.0 16.0 L 37.0 16.0" />
    <path d="M 32.0 49.6 L 32.0 16.0" />
    <path d="M 29.5 27.0 L 34.5 25.0" /> <!-- 수직 기둥용 상단 빗금 -->
    <path d="M 29.5 34.5 L 34.5 32.5" /> <!-- 수직 기둥용 하단 빗금 -->
  </g>

  <!-- 2. 우측 시작 사슬코 기둥 세트 (35도 경사 유지 + 사슬 2개 황금 좌표 매칭) -->
  <!-- 사슬 외곽선 3.5px, 내부 fill="#ffffff"로 구멍 개방 효과 극대화 -->
  <g stroke="#000000" stroke-width="3.5" fill="#ffffff" stroke-linejoin="round">
    <!-- 하단 사슬코 (바닥 위치 수평 정렬 고정) -->
    <ellipse cx="37.0" cy="42.2" rx="3.5" ry="8.5" transform="rotate(35 37.0 42.2)" />
    
    <!-- 상단 사슬코 (우측 정밀 튜닝 완료 좌표 고정) -->
    <ellipse cx="47.2" cy="25.5" rx="3.5" ry="8.5" transform="rotate(35 47.2 25.5)" />
  </g>
</svg>
