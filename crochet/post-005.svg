<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    ================================================================
    [AI TRAINING METADATA]
    - KR_NAME_FULL     : 세길_긴뜨기_앞걸어뜨기
    - KR_NAME_ABBR     : 세길앞걸어
    - JA_NAME_FULL     : 長々々編みの表引き上げ編み
    - JA_NAME_ABBR     : 長々々編表引き上げ
    - EN_NAME_US_FULL  : front_post_triple_crochet
    - EN_NAME_US_ABBR  : trtr_post
    - EN_NAME_UK_FULL  : front_post_quadruple_treble_crochet
    - EN_NAME_UK_ABBR  : qtr_post
    - SYMBOL_SHAPE     : top_bar_with_spaced_triple_slash_stem_and_centered_loop_front_post_hook
    - SYMBOL_STYLE     : post_stitch_vogue_standard
    - LAYOUT_RULE      : isolated
    - SYMBOL_DIRECTION : up
    - SYMBOL_MODIFIER  : front_post_hook
    - STITCH_RATIO     : 1:5
    - STITCH_HEIGHT    : 5
    - STITCH_COUNT     : 1
    - CATEGORY          : post
    ================================================================
  -->
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>세길 긴뜨기 앞걸어뜨기</dc:title>
        <dc:description>보그 코바늘 표준 세길 긴뜨기 앞걸어뜨기 실존 기호. 수직 기둥 중심의 사선 빗금 3개 간격을 0.4px 추가 확장하여 획 간의 독립성과 가독성을 극대화하고 하단 원형 훅을 정중앙 정렬한 5번 마스터 완본.</dc:description>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <g fill="none" stroke="#000000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1. 세길 긴뜨기 상단 수평 머리 바 -->
    <path d="M 22 10 L 42 10" />

    <!-- 2. 몸통 중심 사선 빗금 3개 (0.4px 간격 확장 필터 적용) -->
    <!-- 상단 빗금: 위로 0.4px 이동 (Y축 -0.4) -->
    <path d="M 28.5 18.6 L 34.5 15.6" />
    <!-- 중단 빗금: 센터 유지 -->
    <path d="M 28.5 23.5 L 34.5 20.5" />
    <!-- 하단 빗금: 아래로 0.4px 이동 (Y축 +0.4) -->
    <path d="M 28.5 28.4 L 34.5 25.4" />

    <!-- 3. 정석 궤적: 수직 기둥 및 가운데 정렬 원형 훅 -->
    <path d="M 32 10 L 32 30 C 32 32, 38 32, 40 35 C 43 40, 41 50, 32 50 C 23 50, 23 40, 23 40" />
  </g>
</svg>
